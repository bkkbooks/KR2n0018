body:
  text: 隸續卷六宋洪適撰右武梁祠堂畫記自伏戲至於夏桀齊公至於秦王管仲至於李善及萊子母秋胡妻長婦兒後母子義漿羊公之類合七十六人其名氏磨滅與初無題識者又八十六人得之括蒼梁季珩始豫聞建康寓客有此碑嘗託連帥方務德訪之未至而書已成方亦刻郡齊地逺嵗久殆將亂真也右碑圖下卷范史趙岐傳云岐自為壽藏圖季札子産晏嬰叔向四像居賓位自畫其像居主位皆為讚頌以獻帝建安六年卒家在荆州古郢城中漢人圖畫于墟墓間見之史冊者如此水經所載則有魯恭李剛碑碣所傳則有朱浮武梁此卷雖具體而微可使家至而人皆見之畫繪之事莫古於此也魯恭即魯峻𨽻續卷六
  hash: sha256:664123dfba3be02774a8398bcc7eb0b113e4b0b09965e0ccf127b7bfcca05f4b
