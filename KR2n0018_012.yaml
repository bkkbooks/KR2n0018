body:
  text: 𨽻續卷十二宋洪適撰韓敕孔廟後碑陰故苦令任城吕馥叔苐中李三千兖州從事任城樊何榮公三千故豫州從事魯孔方廣平五百司徒掾薛東門修文理千故豫州從事蕃加進子髙千河南匽師張瓊仲􅐋二百徴士河南成臯蘇漢明二百中郎將掾河南匽師鄰通國二百河南匽師袁徴漢賢二百河南匽師杜晏孔平二百河南匽師杜續升祖二百梁國睢陽龐宣元后二百吳郡吳卓褎孟真二百吳郡吳傳萌叔寧二百山陽瑕北張叔髙二百河南成臯黃伯除百任城王子松百魯王元宗百魯相門下幹文陽羊政子著二百闕作府史文陽薛音漢光故督郵魯孔承伯序故督郵魯孔賴元夏五千故豫州從事魯孔闕三字相史魯孔誧仲助守孔子户百石魯孔聖文相史魯孔術子佑相史魯孔贊元賔河南雒陽嚴肅君祖二百河南雒陽姚闕叔闓二百河南開封王𢎞字景伯二百文陽右尉河南雒陽趙廉闕三字五百河南京尹闕公闕二百河南京尹修元闕二百文陽衛威髙二百河南雒陽李昶申伯二百河南雒陽李廣山甫二百河南雒陽王敬子慎二百南陽宛張光仲􅊲二百故令大將軍掾山陽瑕丘檀敷文有千任城吕株仲儀二百河南雒陽种亮秉髙五百敦煌敦煌翟牖子房二百潁川襄城陽叔叔重二百沛國竹邑薛𢎞公則二百河南雒陽吕籲順陽二百魏郡魏王升子平二百關內侯魯蘇逢孝威二百沛國相劉子宣二百河南滎陽白顒君昂二百沛國蕭劉堂泰眀二百北海都昌孫順江達二百琅邪臨沂紀世髙二百河南雒陽王敞子開二百陳留平丘馬弻闕漢二百平原濕陰王宣元威二百沛國蕭秦憲仲景二百河南滎陽曹闕二字二百北海平昌長河南雒陽李訪伯助闕二字南陽魯陽錡曜叔甫二百陳留圉敦祐伯助二百相史魯孔曜仲雅故督郵魯孔進幼達相史魯孔遵公孫文學百石魯孔芝德英相史魯孔旭連夀東海郎中魯孔欣定伯相史魯孔番安世相史魯孔闕三字處士魯孔徴子舉孔子冢下復民吳仲初弓仲王徐孝都等給掃除夫子壇闕吳仲初徐孟仙弓仲王徐孝都史君巨史元舉弓少珍石治石治京吳叔平九百知公王虎徐升達弓仲過徐安公徐青潁徐孟闕徐世興徐阿道石治勉興徐孟髙徐阿吳阿櫰徐阿仍徐安世徐常子吳阿歐許元世石治安吳阿綬徐君世世徐音闕壯士吳賁吳阿虎闕伯宣單吳五官子衛威高徐國子二百闕猶貴闕弓狼子弓阿闕二字永壽三年七月草八日孔從事所立右韓敕孔廟後碑陰五列所題士大夫可辨者七十人不名者八人漢人題名有稱徴試博士者此碑一人稱徴士蓋聘召而不行者自第二至第五列以其後四行直書冡下復民姓名皆羣小也故不當律令後一行云永夀三年孔從事所立碑以文陽為汶陽裘即衮字即彪字劉寬碑陰門生名故華陰令相國别部司馬漢陽阿陽王曜孝起河內太守濟陰句陽丁從文海千安定屬國都尉南陽宛孟扶公助陰安長安平經孫龜幼升五百郎中蜀郡成都羅桓吉禮五百郎中河內州修統子經千郎中魏郡內黃郭閶子響廣武令漁陽路弋門樊𢎞盛五百陜令上郡奢延郭碩升公五百武功長河內野王李璜元圭五百離石長北地泥陽王邑文都大尉屬左馮翊臨晉駱謖文起羽林郎中河南河南南公珖公明羽林郎中魏郡犂陽張乾元凱列口長濟南東平陵孟豐定髙四百車騎將軍令史西河平陸張君遊五百大尚書河南平陰張祗子千尚書郎下祁下祁皮喬升髙五百尚書令史左馮翊萬年李𢎞德休闕百議郎潁川定陵陳敏元升千議郎河東安邑涼則孔成五百會稽大守南陽順陽郭異元平徐州刾史東萊廬鄉吳幹信武遼東太守河間成平劉胤元嗣東海相河內修武江沛周南益州刾史南陽章陵劉僬闕二字千議郎北地靈州傅燮南闕二字百隴西大守大原下闕下邳中尉南陽下闕東平中尉河下闕交址都尉鬱闕六字産千司空掾彭城下闕司空掾南下闕司徒掾下闕大將軍闕八字五百郎中河闕九字髙元千下闕四人郎中汝南甘陵闕十字友直郎中汝南鮦陽闕四字禪子盛郎中掾章宜春闕二字道升五百郎中廣漢梓潼闕閻元闔五百郎中右扶風茂闕馬畢漢公千郎中南陽魯陽闕二字子房郎中河南開封郭尚仲顯千郎中沛國闕二字菅翰德參郎中河內闕二字張􅘉元祐司徒掾南闕二字馮一稚明千大將軍闕四字潁陰綦母萌德達羽林闕九字寧千羽林闕九字仲禮五百羽林郎闕九字和屬國侯酒泉表闕五字五百屬國侯右扶風闕二字辛儒伯寧千玉門關候闕三字琰元經西部長史漢闕三字楊曽德淵五百太子舍人闕四字吕畼孝直牂柯長史闕四字國公舉千武庫丞潁川郾卜稠子州五百朱虛令魯國魯劉逸仲祖萬城武令勃海東光校萌叔豫五百柏人令魏郡繁陽申育仲彥博令河南密鐔峻興化千涿令遼西令支公孫瓚伯圭千故蓮令張掖日勒傅應幼則五百故陳令汝南安成張徑孝思五百平陵令河內修武聶瑲季康千故重合令山陽東緡吳悺闕達五百良鄉長西河圜陽田植君長千􅚌丘長陳留平丘汲政孝方千狋氏長河內波和政公直五百昌平長陳留扶溝夏稱彥峻皮氏長右扶風杜陽魏傑齊卿五百溝平長魏郡平陽馬就子圭二千闕密長右扶風槐里王京子直千淳于長廣陽安次劉和順仁千漢夀長南郡襄陽龎韙漢光五百博昌長東萊曲成王琬元􅊲千望垣長河南榖城闕陸中和榆次長京兆長安蕫鳯子産五百都昌長琅邪開陽朱並孟君五百海鹽長琅邪即丘閭丘儀元進五百永安長京兆下主駱闕伯彥千闕二字侯相魏郡􅚌丘張光子明闕長汝南召陵張徴伯彥闕邑長涿郡方城劉播叔闕千寧長巨鹿曲周孫楫子闕千上陽長潁川新汲鐘玄元才五百項長潁川陽翟翟扶漢舉臺長彭城武原周暹升舉五百蒲子長京兆長安杜隲伯瓊