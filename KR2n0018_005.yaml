body:
  text: 𨽻續卷五宋洪适撰右樊敏碑兩獸蟠其上就為圭首若今所謂贔屭者其有一鱗猶龍然篆額兩行偏其右文在穿下凡十八行行三十九字空一行刻亂曰二行又空一行低十三字刻嵗月及書造人姓名其云石工劉盛息懆書者劉刻其石而厥子落筆也陳球碑隂書其二故吏之子亦曰息漢刻惟此碑及武斑與羊竇道碑有書人姓名宣和殿藏碑録以揚厥碑為黽漢疆者考其碑云五官掾南鄭趙邵屬裒中黽漢疆書佐西成王戒主葢三人主其事書佐則王戒之職非漢疆書書之也歐陽叔弼以袁逢華廟碑為郭香察書考其碑云敕都水掾杜遷市石遣書佐郭香察書葢一人市其石一人察其書非郭君書之也張稚圭據圖經以孔廟卒吏碑為鍾繇書按此碑以永興元年立繇以魏太和四年卒相去亦七十餘年謂之繇書者非也天下碑録以周公禮殿記為鍾㑹書按此碑以初平五年立魏書云㑹以正始中為尚書郎注謂之弱冠登朝葢已在初平四十年之後矣謂之㑹所書者非也北史江式云魏邯鄲淳以書教皇子建三字石經於漢碑西按此碑以正始三年立漢書云元嘉元年度尚命邯鄲淳作曹娥碑時淳已弱冠自元嘉至正始亦九十餘年式以三字為魏碑則是謂之邯鄲所書則非也其它雜書指劉熊王建詩老子周越法書苑范式李嗣真書品州輔汝帖夏承臨汝帖魯峻譙敏並碑録等碑皆云蔡中郎所書或字體之不類或時代之遼絶葢不辨而自決至若魏受禪勸進碑或以為鍾繇或以為梁鵠凡非出於本碑者皆不足信也右廣漢屬國造橋碑有二人坐於上若賔主之容葢辛李二君也中有一器其後各有使令者一人上有題字已磨滅所餘府卿明府四字畫像之下横刻二君官氏凡二十六字其下有文十七行行三十七字明君明府皆平闕我君高遷之句君字亦平闕其後有題名五行右費鳳碑篆額三行在穿之右其左有物如螭垂其首者三文九行行三十五字中分其石此銘居其半其餘則低三字載施業戚忠之事又七行行四十四字題名五行行二人碑陰二十二行行二十七字右陳球碑篆額二行黑字圭首甚大一暈䨱右復有二暈文在穿下凡十九行後有裂者下斷所存者行二十四字碑陰穿暈皆同縱横亦有裂文前兩行書二人之事餘存二十行行二人復有一碑篆額二行穿暈略同文二十行行三十七字其下亦有斷者右山陽麟鳳瑞像右鳳而左麟其下各刻一贊碑陰又刻銘辭皆小篆兩旁有隸字其篆云永建元年季秋七月饗時山陽太守河内孫君見碑不合禮掾夔造新刻瑞像麟鳳其銘辭曰漢盛徳中興即政二年辛酉之蔀首厯六十青龍起蟬嫣三月季春爰易立碑石順禮典文九九應度數萬世常存爾雅注單閼音丹遏一音蟬嫣永建二年嵗在丁卯故此碑用蟬嫣字米元章畫史云此圖半篆半隸麟一角上高如足翹如惡馬鳳高冠尾長甚可怪也以詩題之曰非篆非科璞已雕形容振振與蕭蕭曽因忠厚方周徳坐想訏謨覽舜韶漢徳已衰還應孽魯邦既弱不為妖虚齋自是驚人玩不勝雄狐遂怒鵰漢碑有麟鳳者不特此一碑元章特未之見耳右劉寛神道二刻隸字各二行其上皆有螭左右相向其下有一獸之面兩旁頗不具或是打碑人所損右王稚子二闕其右則騎而西者二人其左則乘車而東者二人挽之者橐佗也王君平生官簿互見於兩闕之上𨽻續卷五
