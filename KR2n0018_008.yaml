body:
  text: 𨽻續卷八碑圖宋洪适撰右功曹史殘畫像為旁行者四第一行凡五車中車而坐者一人御者亦一人自第二車復有一人踵其後右執杖左執一物如扇之狀最後别有一人石缺不能盡見第二行導者二人左執管而吹之其右則石缺凡三車車後不復有人最後人一車纔見其馬之半第三行導者四人右持鐃左執管凡兩車最後又一車則見其人之半面第四行一人乗馬在前次二車其前車亦有一介隨其後最後又一車亦見其馬之半車各一馬有蓋左方通下三行為一可見者二大車後有二馬奴𨽻凡六人其前則缺矣泰山爲㐀令畫像未録右雍丘令畫像所存者八車十三馬宋有一車不全見車上之人十有六馬上之人四奔走於車馬之前者四人右成王周公畫像君臣侍御凡九在其後者一馬右𨽻圖中卷其碑三皆東州漢人丘壟間所刻趙氏跋北齊隴東王感孝頌云濟州平陰山頂有古冢隧道尚存塞其後而空其前類杜預所見邢山鄭大夫冢上有石室制作工巧其内鐫刻人物車馬似是後漢時人所為水經謂之孝子堂隴東訪之耆舊以為郭巨墓又跋唐趙冬曦祭仲山父文云水經謂成陽有仲山父墓嘗得其石室畫像上有八分書題云君為從事時以字畫及衣冠人物驗之乃東漢時所為漢末仲氏為成陽大族後人因仲氏所葬遂誤指為山父墓歴陽徐藏子禮謂子曰其季父兢政和年自濟陽代還所得漢世人物畫頗多則知兖豫間冢中畫像殆不一姓此卷前一碑得之張安國參考米氏畫史疑是朱浮墓壁者後二碑得之朱希真家雖有車馬人物不可得而强名也圖於此俟多識者證之𨽻續卷八
