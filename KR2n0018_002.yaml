body:
  text: 𨽻續卷二宋洪適撰新莽候鉦候鉦重五十來斤新始建國地皇上戊二􅏵右上上晦造夫放守史凡掾大夫左丞守令嘉掌共工大夫闕二右候鉦四十二字闕二字王莽地皇二年所作紹興中出於金州今在毗陵胡承公家漢器如館陶釜甘泉內者鐙之類雖非彞鼎間古文蓋猶是篆體獨此器所書有波畫字尤清徑與漢末筆法無異孰謂西都隸字皆古拙乎范史祭祀志東夷傳俱有建武中元之文與此所謂始建國地皇相類語在何君閣道碑說文漆象形如水滴而下賈山云漆塗其外是也而漆枲絺紵椅桐梓漆之類經傳已多借用至今反以漆為古字漆沮之漆却有省其水者韓勑碑書漆作此云重五十來斤者隸法小變而借用作七也吳天璽年國山碑云神女告徵表祥者世有漆唐裴談司刑寺佛跡碑云長安二漆夫豈無據乎惟北齊文宣以七為漆而誅上黨王渙則冤哉虐也數自一二至於玖拾莫非假借獨㭍字鄙俗無它訓若倣古而用漆漆豈不韻勝莽本傳云莽自以土行故令太傅府置戊曹以戊子代甲子為六旬之首冠用戊子為元日昏以戊寅之旬為忌日令太史推三萬六千厯紀六歲一改元遂改元為地皇其所下書有上戊六年之文孟康注云上戊者莽所作厯名故此云上戊二年也趙氏有居攝墳壇刻石其一曰上谷府卿墳壇一曰祝其卿墳壇皆居攝二年造趙云上谷郡名祝其縣名王莽時官名日易史家不能盡紀不知府卿祝其卿為何官豫嘗於廣漢屬國造橋碑論之矣應劭所云大縣有丞左右尉所謂命卿三人漢隸有吳郡府丞武開明碑而武榮碑中稱之曰吳郡府卿又沈子琚綿竹江堰碑云縣丞王卿則居攝墳壇刻乃上谷府丞祝其丞也豫未獲此二碑因說王莽候鉦故并及之耿氏鐙延光四􅏵二月耿氏作鐙比二工張造右耿氏鐙安帝延光四年所作見於錢唐薛尚功彞器款識碑比二者言如此器之比有二也兩漢器物銘存于今者皆是篆文獨此一鐙用隸第薛君酷好篆古不習隸法模勒不精頗失其精未知此器今藏於誰氏也五君杯柈文大老君西海君東海君真人君仙人君右五君杯柈文十五字子所見者已裝治成帙不得詳其形製五君之旁有棬各三徑三寸餘其中者圓若碑碣之穿上下二棬則􅤚褊不勻亦有闕其一者藏碑若歐趙皆所無有復不見於諸家雜說中殆莫知其為何物獨武陽黃伯思長睿作洛陽九詠其瞻上清一篇中云窪柈五兮石杯九饗西后兮腏東后所注甚詳今并録其詞云眷邙阜兮北睇眇璿題兮雲際羌胡為兮斯宫肇先唐兮六世唐初北邙有老子廟開元末廟北别建𤣥微觀後曰上清宫蕊殿兮穹崇桂棟兮椒墉綺疏晃兮杲日瑶鐸韻兮曽空峨雲冠兮紛羽袂飇為車兮鶴為驥曖羣真兮飛軿悉雲從兮仙李日旗兮霞斾騰玉虯兮沛艾穀祖祀兮肅祗堟瓊章兮綷䌨唐明皇朝謁齊宿斯宫有詩石存焉焕妙繪兮秀發五龍儼兮千鷺列悼兩駮兮壒䝉隨一掃兮煙滅宫壁有吳𤣥𤣥畫即杜甫稱五聖聯龍衮千官列雁行本朝祥符中府吏以其故暗剗而更畫森羅妙絶之跡一旦掃地矣李西臺建中得數像齊壁後為大水所沒鬱梁子兮翠枝樛藏史西兮麗紺牛度函關兮代邈木何為兮此留殿有古木相傳名梁子木老子以繫青牛蓋後人假託明甚窪柈五兮石杯九饗西后兮腏東后若胚渾兮自然差眇茫兮難究宫中有石上列圓穴五橢穴九俗謂之九卯石側谷有題記曰大老君真人君仙人君東海君西海君字與漢人隸法同其穴殊無刋刻之跡乃漢世所作以祠真仙耳圓者代柈橢者代杯就石為之若窪尊之類或謂晉世仙人白仲理作此鍊丹非也蓋字畫類漢世隸不類晉體柏翠兮梨紅金井露兮玉橙風思少陵兮不可再得吾獨吟乎山之側又東觀餘論載政和中黃君瞻上清跋語云此碑帙有五君杯柈文故書於右且云欲考杯柈所以者觀此可知也宣和殿藏碑録以為漢碑面名之曰真人君石樽刻與四老神祚機刻石同帙良由此石就其上有器物之狀以祀五君故或謂之杯柈或謂之石樽而黃君之詞可據始知是洛陽上清宫中之物其文惟大老君三字最大蓋尊老子也西海真人六字却似晉人筆札豈鐫刻有工拙乎六經無真字獨於諸子見之延熹中蔡雍作王子喬碑及仙人唐公房碑皆有真人之稱矣征南將軍劉君神道有漢征南將軍劉君神道右征南將軍劉君神道十字大小與王稚子闕相類而剛徑過之惟後兩字刓損兩漢雜號將軍掌征伐背叛事訖則罷不常置也唐杜佑云四征興於漢代四安起於魏初四鎮通於柔逺四正止於喪亂在光武時岑彭嘗建征南之號矣牛僧孺𤣥怪録載盧公渙為明州刺史時有盜發漢征南劉將軍墓者蓋在明之翁山縣其官氏偶同非此劉君也司農劉夫人碑漢故下闕右司農夫人碑漢太尉許馘之室也首行有標題之文石已刓剝所存數十百字其漫漶者强半惟次行獨全故知其姓劉氏而為山陰之人其辭惟數句可讀如云體性純淑非禮不行及孫息盈房而已其云德配古列任似者以姒為似也字畫多雜篆體所書以字全類孔宙碑其它偏旁多與故民吳公碑中山相薛君題額相類應劭漢官儀所載三公孝靈時有吳郡陽羡許馘季軼范紀光和四年馘以衛尉代劉寬為太尉今許氏兩墓皆在宜興而此碑猶在夫人冢旁吳處厚青箱雜記云義興有許馘廟其碑許邵所作唐開元諸孫重刻碑陰有八字云談馬礪畢王田數七徐延休讀之曰談馬即言午言午許字礪畢必石卑石卑碑字王田乃千里千里重字數七是六一六一是立字今其殘碑才有數十字其間載許君自司農遷衛尉此又稱劉氏為司農夫人則銘墓時許猶未為衛尉也其碑在光和之前無疑建康王厚之云其友陽羡邵偉嘗泛舟過許氏叢冢見水濵一石舉而察之則許君殘碑也邵遂載以歸厚之字順伯樂古多聞山陰石臺卿亦佳士搜奇抉怪埤助此書為多任君殘碑陰上闕三四􅏵九月十日五官掾闕十令君闕三主闕七何治闕五先桓守史景闕二十五故官石官二闕十四屮闕二七闕四四千木闕二直千二百闕二鼎縛官闕二直九百闕三屮二三千百君殘官石􅋄校見左石廟􅈬時主事闕十掾杜峻珍史何又下闕右任君殘碑蜀人謂之武帝先生任君碑陰所謂先生似若𤣥儒先生婁夀之類第武帝二字必有訛也此碑可辨者不盈百字惟掾杜峻孟珍姓名獨存何孟二史僅有其姓前有四年九月十日五官掾字而紀年及名氏皆闕中有直千二百直九百及四千三千字又有石屮木莋及廟就字蓋是計繕修所費豈任君有祠于彼而邦人尊事之乎舉吏張𤣥殘題名碑舉吏汝南細陽張𤣥下闕魏郡內黃下闕千故吏河內林慮闕四二千上闕薛令寧陽闕四千門生濟南郡平闕二文千門生濟南梁鄒虞升仲遷二千門生東郡范夏闕二二千門生東郡東闕六門生東郡闕七千門生平下闕安德下闕千門生南下闕門下闕千門生任城下闕門生下闕千上闕和五百門生下闕五百門生下闕門生下闕右舉吏汝南張𤣥殘題名其可見者故吏河內一人門生東郡三人門生濟南二人門生平原任城各一人薛令有其官而亡其姓名惟虞升一人郡邑名字及所出錢無一字闕者漢碑稱舉將者有二外黃令高彪碑稱潁川太守文君為舉將三公山碑元氏尉樊子義稱常山相馮君為舉將其自稱舉吏者獨於此碑見之公乘伯喬殘題名上闕廣都公乘伯喬上闕曹守長郫審叔雍右公乘伯喬殘題名所存者一列二人廣都及郫皆蜀郡之邑而所題者乃其蓋字西州之殘碑也雒陽稚子六字先置雒陽稚子右雒陽稚子六字其大小與王稚子二闕相若而波磔不越乎規矩之外亦刻於稚子闕上但殘闕不具無先後之序平陽府君六字平陽府君紂神右平陽府君六字蓋漢神道所刻者石缺不全莫知為何人漢字存于今鮮矣譬之麒麟一毛虯龍片甲皆可貴也𨽻續卷二
