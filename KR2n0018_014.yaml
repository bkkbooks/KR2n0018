body:
  text: 𨽻續卷十四宋洪適撰太守張景題字光和六年四月太守張景闕二字治郡闕二字追念先祖闕德闕三字早失覆闕門闕三字孤焭自悲太守闕三字君闕五字間闕歸文學紀刋先象上闕之少子竝早右太守張景題字四行在髙眹石室梁上磨滅鮮成章句首云光和六年四月太守張景中有追念先祖早失覆闕孤焭自悲紀刋先象之句相去尺許有少子早之文前有治郡二字蓋張君追逺之詞也博士題字上闕議采夫闕三字以詩書發闕京師受業春秋闕四字覽異闕三字仲舒非胡母闕嘗祭郊闕七字晨闕四字其闕故悲闕二字之闕後草年知闕五字蓋闕五字不嚴闕是消闕四字詢謀道為國師出典方州忠著金石下闕上闕博士下闕右博士題字七行可識者五十六字不可識者六十餘字亦在髙君石室中末行有博士二字上下文皆湮沒其中云以詩書發闕京師受業春秋闕二字仲舒智非胡母末云道為國師出典方州忠著金石其人受春秋業而以仲舒胡母為比蓋是傳公羊春秋者洪農太守張君題字故孝廉闕五字陵相闕君伯髙𢎞農下數行闕上闕著德義方襲父經業春秋尚書貫闕四字忠闕宣海內題髙闕孑焉正之苖發闕四字晨所闕垂澤章彼闕言𢎞農太守張闕子陽張叔之子也右𢎞農太守張君題字五行亦在石室中末行云洪農太守張某子陽張叔之子首行有故孝廉陵相君伯髙𢎞農十字陵之上闕五字相之下闕一字其文有著德義方襲父經業春秋尚書海內歸髙之句與前一人皆是以經學名家者髙聯石室六題名上闕土成都杜宣字菅偉上闕州大守審長賔上闕廣都公乘伯高上闕昌守長審武陵大守杜伯持武陵令楊林仲和中郎下闕大尉三公下闕州刾史河下闕清白土下闕娉土張下闕闕張下闕揚子雲司馬相如太守趙下闕右髙聯石室六題名與前三段題字皆刻在梁相石壁之間近嵗好事者秉燭入室而模之始傳于世蜀人多未知也所題前後不同時其一杜審公乘四人其一武陵守其一武陵令其一中郎將太尉掾并州刺史三人其一清白士娉士三人其一揚子雲司馬相如趙太守三行卿雲二公蓋後人追書者字畫清逸可愛以娉為俜永平甎文永平八年七月草日作右永平甎文四行九字云永平八年七月草日作汝伯寧甎文建初三年八月草日汝伯寧闕萬嵗舍大利善右汝伯寧甎文六行十八字建初三年作末有萬嵗舍大利善之文與曹叔文甎所謂萬嵗署舍同或是卜築所用者邯君篆甎亦謂之萬秋宅漢人無忌諱如此曹叔文甎文建初七年八月十三日叔文作千萬嵗署舍命史後子孫貴昌闕二字未央大吉右曹叔文甎文八行行四字建初七年作有千萬嵗署舍子孫貴昌未央大吉之文謝君墓甎文元和三年五月甲戌朔謝君闕造此墓右謝君墓甎文四行十五字云元和三年五月甲戌朔謝君造此墓永初甎文永初元年景師造大吉陽冝侯王右永初甎文直書一行云永初元年景師造又一甎云大吉陽冝侯王皆近嵗出於蜀中漢人作舍宅營墟墓甎多有字又有篆書數甎乃建武二十八年北宫衛令邯君千秋之宅者其一有冨貴昌字或云得之范皮闕旁法書要録引鼎録云蜀章武二年作二著鼎一賜魯王銘曰冨貴昌宜侯王一賜梁王銘曰大吉祥宜公王觀漢甎及器物多有此文則知蜀人鼎銘蓋采用前代之語定陶鼎欵識髙廟定陶廟容十斗字非重九斤二兩右定陶鼎蓋有髙廟二字頗大腹有都倉二字次之又有定陶小字四行惠帝令郡國立髙廟時帝子恢為梁王定陶梁所都也其後元帝子為定陶王王之子入繼大統更封楚王之子於定陶北乃廟中祭器不知何王所作髙廟兩字方正髙古略無篆勢定陶十一字則參雜篆𨽻之體它器亦有相類者都倉二字即是篆文此器舊藏宣和殿與九鼎齊飛矣吁延光銅壺欵識延光四年銅二百斤直錢萬二千右銅壺安帝時作欵識二行十三字字從左起云延光四年銅二百斤直錢萬二千在建康秦民元嘉刀銘元嘉四年五月丙午日造此銅官刀長四尺二寸闕二字冝侯王大吉羊右元嘉刀威宗時作其文云元嘉三年五月丙午造此銅官刀長四尺二寸闕二字冝侯王大吉羊在張循王家以羊為祥騶氏二鏡銘騶氏作竟四夷服多賀國家人民息敵仇殄滅天下復風雨時節五榖孰長保二親得天力東王公西王母騶氏胡餘字同上右騶氏二鏡銘七言五句云騶氐作竟四夷服多賀國家人民息敵仇殄滅天下復風雨時節五榖孰長保二親得天力二鏡雖有大小而銘文無異同小鏡惟氏字筆法小變胡氏不是反文大鏡又有兩人相鄉坐其旁小隸云東王公西王母大者藏故江陰守王直中家小者藏故司直洪藏家黃長睿審定以為漢器其說見東觀餘論但錯認其中數字大史公書齊有三騶子范史春秋家有騶夾班史竝作鄒則知二字通用說者謂校官碑親取寶智劉熊碑寉鳴一震皆蒙下文故賢鶴從省此銘鏡省其金與婁壽碑省爵為楊孟文碑省斜為余同非䝉上下文也又反胡為􅨨與唐扶碑反陜為郟鄭固碑反獨為􅍦同宣和博古圗有漢尚方冝子孫鏡其銘首云尚方作竟四夷服末云長保二親子孫力傳吉後世樂無極中二句並同字畫又切相類李氏鏡銘李氏作竟佳且好明如日月世之保白虎辟邪主䣄除道渴飲玉泉飢食闕由天下不知老右李氏鏡銘亦七言五句云李氏作竟佳且好明如日月世之保白虎辟邪主除道渴飲玉泉飢食闕浮由天下不知老又有二獸奮迅拏攫即白虎辟邪也其文鏡省其金除反其邑浮反其水以保為寶以由為游頗與騶氏鏡相類博古圗又有漢尚方一鏡銘云尚方作竟真大好上有仙人不知老渴飲玉泉飢食浮游天下敖四海夀比金石國之保尚方二銘與騶李所作者略同恐未必顓是宫禁中所用中平獸洗欵識中平三八月造作右中平獸洗欵識一行云中平三八月造作用冨最下兩字甚野蓋鑄冶小失所書者獸在其左若駝非駝若麟非麟紹興中長沙攸縣劉氏浚塘獲十六器家弟景盧得其一修官二鐵盆欵識草五草年修官作草五右修官鐵盆二乾道中陸游務觀監漢嘉郡得之古人作器必銘志其輕重大小亦謹權量之一事隸釋中地皇候證所云五十七斤者計其重也永平鹽盆所云三百五十斗者言其容也此兩盆皆有草五石字乃籥合升斗石之石非銖兩斤鈞石之石也字畫無篆體蓋東漢初年所作其文有草年字而無紀年之名東都惟建武建安有二十年此必建武之器所謂修官正與永平巴官同恐是識鐵官之地名未詳其義晉銅澡盆欵識泰始元年闕月七日右尚方治御府故二斗五升銅槃重九斤八兩苐二右銅槃晉武帝時作欵識云泰始元年闕月七日右尚方治御府故二斗五升銅槃重九斤八兩第一字甚小而遒徑今在宜興惠公衮家東都工於隸者未能逺過魏晉石刻今其存者鄧艾彭祈母稚陸喈數碑以此比之泰山之於丘垤也董氏二洗欵識董氏闕好董氏器右董氏二洗一欵其右曰董氏雅好一欵其左曰董氏器中圗一鼎鼎上有禽今雖藏於二家乃一人所作者雖無年月可考却非魏晉人字畫亦可證董姓之從童也隸續卷十四
