body:
  text: 𨽻續卷十一宋洪适撰司空孔扶碑上闕子十九世之孫公始即位辟故襄上闕威卿為曹屬東閣祭酒以尚上闕公拜闕上疾病卒官有子男二人上闕各闕致身晨以與君上闕建寧元年三月十八日丙申晨從上闕四月十一日戊子到官謁孔子冢下闕上闕念殁親五内慘惻霰然隕涕闕故上闕令闕晨追感亡父見遇立闕石上闕以示後昆魂而有神炤其下闕右漢故司空孔公之碑𨽻額闕里祖庭記孔林有司空孔扶碑碑録云司農孔峽碑在仙源縣墓前建寧元年立農峽二字乃傳寫之訛其文上一半皆已淪缺僅存其下九行多者十有四字碑云孔子十九世孫則泰山都尉宙河東太守彪臨晉令僖之從昆弟也順帝紀陽嘉二年六月太常魯國孔扶為司空注云字仲淵次年十一月免詳此碑之辭乃司空當國時辟史晨之父為士曹屬東閤祭酒後三十有三年當靈帝建寧之元年晨自越騎校尉拜魯相以三月丙申受命四月戊子到官既謁先聖冢遂為司空公刻此碑其文云五内慘惻霰然隕涕追感亡父見遇立石以示後昆蓋是懐恩醻徳之碑非表阡納壙之文也趙氏以為魯相謁孔子冢文當是不見其額之故漢志公府官屬自西曹已下凡十二曹不云有士曹有黄閤主簿而無東閤祭酒亦闕文也武都太守耿勲碑漢武􅚾太守右扶風茂陵耿君諱勳字伯瑋其先本自鉅鹿有令名為漢建功俾侯三國卿守將帥爵位相承㠯迄亐君君敦詩説禮家仍典軍壓難和戎武慮慷慨㠯得奉貢上計廷陳惠康安遏㞢謀上納其謨拜郎上黨府丞掌令考績有成符英闕胙熹平二年三月癸酉到官奉宣詔書哀閔垂恩猛􅄇殘義寛􅄇宥姦喜􅄇縱慝威􅄇戮仁賞㳟罰否畀奥闕流其􅋋統闕寵存贈亡篤㞢至也嵗在癸丑厥運淫雨傷害稼穡率土暜議開倉振澹身冒炎赫火星㞢熱至屬縣巡行窮匱陟降山谷經營拔渉草止露宿扶闕餐千有餘人出奉錢兩闕二字振衣賜給貧乏發荒田耕種賦闕寡獨王佳小男楊孝等三百餘户減省貪吏二百八十人勸勉趍時百姓樂業老者得終其夀幼者得㠯全育甘棠㞢􅄇是過矣又開故道銅官鑄作錢器興利無極外羌且闕等怖威悔重譯乞降治狹道分子効力闕二字如農得衆􅖕㞢歡心可謂卬㞢若明神者已夫美政不紀人無述焉國人命嘆刊勒斯石表示無窮其辭曰泰華惟岳神曜吐精育兹令徳既喆且明寔謂耿君天胙顯榮司牧莅政布化惟成嘉惟則穆如風清勤䘏民隱拯阸扶傾闕皇闕二字東撫西征赤子遺慈㠯㠯生山靈挺寶匃闕字平愷悌父母民賴㠯寧熹平三秊四月廿日壬戌西部道槗掾下辨李造右武都太守扶風茂陵耿勳碑靈帝熹平三年造在成州同谷縣載熹平癸丑淫雨害稼耿君開倉振澹冒熱行縣經營扶活千有餘人出奉錢以給衣賜發荒田以賦寡獨凡百有餘言又稱其鑄錢器脩狹道之績蓋徳政碑也造碑之人即李翕天井碑中西部道橋掾李也壬子之夏李翕尚在武都次年暮春耿君到郡似是繼翕者碑云其先本自鉅鹿世有令名為漢建功俾侯三國卿守將帥爵位相承按漢史雲臺功臣牟平侯耿純者鉅鹿人其三弟亦同時封侯好畤侯耿弇者茂陵人傳云其先武帝時以吏二千石自鉅鹿徙中興初其父況封隃麋侯弟舒封牟平侯所謂俾侯三國者謂隃糜父子也耿氏自中興後迄建安之末大將軍二人將軍九人卿十三人列侯十九人中郎將護羌校尉及刺史二千石數十百人所謂爵位相承者也好畤鴻烈與宼鄧齒其後有列傳者四人皆抱將帥之略著邉徼之勳碑謂武都敦詩閲禮家仍典軍壓難和戎武慮慷慨陳惠康安遏之謀天子納而用之可謂能世其家者既貫茂陵則是隃糜之後裔也碑以説為閱以拔為跋都鄉孝子嚴舉碑都鄉都里孝子嚴君父馬字子順結治身非義􅄇行闕郡入州居闕二字孝位至蕃車產生三女絶嗣無男憤然闕恐闕户孤寒宗族闕二字收集孤闕二字㕥後禮爲人後則爲人子舉闕十字尤勤和顏闕㕥闕終制闕行闕忉怛憤泣憔悴消躬闕亂􅄇闕􅄇闕六字母老闕三字請然後為稽然後行闕十一字孝順則閨門闕積行慎心徳刑州里莫􅄇稱闕歌闕二字慈仁其闕三字前世官賢有秩長思裦大其義造闕八字善君子之倫共立碑表勒石述嘆以章其芬頌曰闕四字炎翟隆徂徳配神廣波明察化及黔首施㳅潤闕九字慈順博愛九族和睦事繼若眞行為表式殊性異曾闕三字克諧闕勳無徳􅄇闕勒石示後後生惟則亂曰休哉休哉闕二字君闕三字施闕二字兆民勒石表義闕三字仁闕七字鎮君明臣孝行著成兮𤣥㐀報徳奐煥榮兮貫洞祇靈永闕隻兮闕示萬基闕施闕兮延熹七年五月辛未朔十一日辛巳臨江長愷丞杜謂都闕言孝子嚴舉為父行䘮服制踰禮追恩義闕表門閭有書賢明宰卿闕應風生是㕥天闕仁人孝弟之至通洞神祗盖㳤闕賞則庻民勸今書到闕二字勉加勞來以究言如詔書君敬上闕二字頴闕秩巡書佐文翠右都鄉孝子嚴舉碑崇七尺其二分之下横有裂文近嵗出梁山軍所傳者皆至裂文止石理皴剝文意間斷不知其尚有闕遺也予再得之始是全碑嚴舉姓名甚分明其碑有文有頌又有亂曰十六句蓋嚴舉之父仕至郡守三女無男以舉為後舉能和顔奉親送終盡孝母氏年老事繼若真徳刑州里官表門閭弟子共為立碑又有數行載邑官甄表之因顓稱其為父行喪制踰禮延熹之七年也碑以蕃為轓以陸為睦以基為朞嚴舉碑陰丞廣漢厲國王杜字文柜右尉楗為南安周位字惠照都尉有秩安漢趙宣字茂逹鹽官有秩安漢任闕字立中向主吏諱旻字孝聖趙主吏諱齊字伯盛楊主吏諱字顯宗楊督􅗯諱鎮字敬寶文主吏諱湯字稚倉楊侯諱龐字志髙楊主吏諱時字廾臺趙掾諱護字季文弟子趙胡字彥桓弟子楊詡字闕二字弟子楊榘字闕道弟子楊習字叔闕弟子楊序字孟直弟子文詩字憲伯弟子屈壽字伯珍弟子㐀藺字漢王弟子闕二字字叔闕弟子楊壁字彥玉弟子杜雲字闕聲弟子􅉌髙字仲䠂弟子楊汎字闕賢弟子襄闕字長弟子􅉌鳯字闕鸞弟子􅉌闕字闕髙弟子楊頌字闕仲弟子楊顔字闕淵弟子楊羽字闕二字弟子文安字闕二字弟子楊就字闕二字弟子楊闕字闕二字弟子闕憙字闕髙敬闕賢梁宿寐􅄇忘故丞闕四字字興達右嚴舉碑陰贈此者初無主名因見其間有都鄉有秩姓字而嚴孝子碑中臨江丞名杜合二碑則短長闊狹相若横有裂文亦相等始知是嚴舉碑陰丞尉之次都鄉鹽官二有秩次則主吏督郵八人書云向主吏諱某字某揚督郵諱某字其鼎其姓於吏職之上而以諱挈其名漢碑它無此式者下兩横弟子二十三人末有華容丞名字主吏督郵弟子不書鄉邑皆臨江人也臨江在漢屬巴郡南安長王君平鄉道碑維平鄉明髙大道北與武陽西與蜀郡青衣越嶲通界闕制由㳻山上隨沿回曲字闕危難字經隨闕險登髙望天車馬􅄇通闕二字􅄇闕虫闕二字周古古闕三字磨民吏莫字䏸自闕二有闕二字闕三字崖易之遭闕􅄇進崖横道臨大江闕二字危闕四字或墮􅄇陷闕復爲民周永元七年十月南安長右扶風闕倉一君闕民利除周遣掾何童史道與有秩闕道家闕囙民力闕崖平碓及泊潭山闕格通達平直廣大道闕長及畸闕灰賊盜區止車馬馳驅無所畏商市闕四字平闕六字百姓如願開闕采石今闕二字刻石之功恩及子孫去危就安萬世無患永永無窮闕後因闕八字掾槗義尉曹史任政楊莫承汁邡王卿江元尉竹楊卿掾楊𢎞主泊山史闕易子闕永元八年四月十日兼户曹掾何童史道造書崖􅘄朱仲王回左闕大闕二字炅皆冨昌闕三字明下立闕四字馴孝闕四字王前南長闕方主右南安長王君平鄉道碑今在嘉州夾江縣和帝永元八年掾何童史道興所造嵗逺日長字體失真前書已不著録以其永元碑也故復收之碑云平鄉明髙大道北與武陽西與蜀郡青衣越嶲通界由涪山上回曲危難登髙望天車馬不通永元六年南安長扶風王君遣掾何童史道興取崖通道車馬馳驅無所畏難所平之碓即離碓也其間有掾史橋義任政楊莫楊𢎞丞汁邡王卿尉緜竹楊卿姓名應劭云小縣一丞一尉所謂命卿二人此碑丞尉皆稱卿與應説合掾史稱名而丞尉不名蓋書崖者尊之南安武陽皆犍為之邑蜀郡越嶲則其鄰郡犍為今嘉州也碑以汁邡為什邡什即緜竹武都太守李翕天井道碑蓋除患蠲難爲惠鮮䏻行之斯道狹阻有坂危峻天井臨深之阨冬雪則凍渝夏雨滑頓傷害民拘駕推排之役勤勞無已過者㠯爲大太守漢陽河陽李君履之若辟風雨部西部道槗掾李闕鐉鎚西坂天井山止闕人入字丈四尺堅無臽潰安無傾覆四方賴之民恱無彊君徳恵也刊勒紀述㠯示萬載建寧五年四月廿五日己酉訖成右武都太守李翕天井道碑今在成州靈帝建寧五年造碑云斯道狹阻有阪危峻天井臨深冬雪則凍夏雨滑澾過者戰戰以為大慼李君復之若辟風雨西部道橋掾李祗鐉鎚西阪安無傾覆四方賴之李君以建寧三年到部明年治西狹又明年治郙閣治天井可謂除患蠲難心乎惠民者碑以彊為疆即汰字即戰字臽即陷字武都丞吕國已下題名丞右扶風陳倉呂國文寶門下掾下辨李虔字子行故從事議曺掾下辨李旻字仲齊故從事主薄下辨李遂字子故從事主薄上禄石祥字元祺五官掾上禄張亢字惠叔故従事功曺下辨姜納字元嗣故従事尉曺史武都王尼字孔光衡官有秩下辨李瑾字瑋甫從史位下辨仇靖字漢徳書文下辨道長廣漢汁邡任詩字􅏊起下辨丞安定朝那皇甫彦字子木右武都丞吕國十二人題名在天井磨崖之後其六仇靖字漢徳書文者揮翰遣詞皆斯人也郙閣題名云從史位字漢徳為此頌中間姓名刓缺得此乃知前碑亦仇所作漢志武都郡七城一曰下辨二曰武都道此一下辨道長任詩則漢志闕一道字司𨽻校尉楊淮碑故司𨽻校尉楊君􅍏諱淮字伯邳舉孝廉尚書侍郎上蔡雒陽令將軍長史任城金城河東山陽太守御史中丞闕爲尚書尚書令司𨽻校尉將作大匠河南尹伯従弟諱弼字頴伯舉孝廉西長伯母憂去官復舉孝㢘尚書侍郎遷注丞冀州刾史大醫令下相元弟功徳牟盛當究三事􅄇幸早隕國䘮名臣州里去覆二君清頌約身自守俱大司孟文之元孫也黄門同郡卞玉字子珪以熹平二年二月廿二日謁過此追述勒銘故財表紀右司𨽻校尉楊淮碑靈帝熹平二年同郡卞玉過其墓為勒此銘敘淮及其弟弻前後歴官且稱其功徳牟盛當究三事不幸早隕又云俱大司𨽻孟文之元孫也紹興中此碑方出歐趙皆未見之碑云楊君厥諱淮字伯邳葢以厥字為語助大司𨽻有石門碑亦云楊君厥字孟文今古皆以厥為孟文之名得此始知其非凡稱元妃元子元兄元舅之類皆以長言之二楊俱曰元孫猶元士然以元為美稱也華陽志淮者渙之孫孟文名渙李固薦累世忠直拜尚書陳蕃表為河東守遷尚書令奏治汝南孫訓南陽曹麻潁川曹騰三郡守罪訓者梁冀婦家子為司𨽻劾異叔執金吾忠不朝正人尊憚之膠東令王君廟門斷碑二自王氏之先出闕季下闕九世闕二字乃復聞聲下闕衆勝邯鄲之圍强下闕其爵者曰侯曰王景下闕溺而濡足至孝昭二秊下闕夏甫舉孝廉闕令下闕噲字叔恭博士徵陽下闕已後㘸亐京師者五世下闕陽太守自髙平就學下闕宗直道者率困而後下闕子勃海府丞次子尚書郎下闕茂舉孝㢘爲譙令去官下闕仇牧之忿舊不難名下闕弱弟居荒亂之中闕鯨下闕爲郡功曹去官家拜下闕令闕所宰莅馳化如神下闕辰也秊卌有一黄初五下闕張氏祔亐先姑仰堂宇下闕上闕念鼎足爰建時闕五字式不上闕魏后實天所授􅖕發屯闕三字如舊上闕周服従此龍光文好俎豆武侯鷹揚上闕十朱旗乃舉席卷三闕充成帝宇下闕路闕二字逸民闕二字逸民匪彫匪琢闕哲闕二字有處顯允君子㦯黙㦯語上闕光隆前闕伊漢中葉皇極不建上闕我闕漢闕闕車束帛有琖上闕庶績咸喜咨陽闕維上闕亢闕允闕匪闕攸居闕二字王所上闕空彝倫攸闕沖質闕祚炎闕中微上闕人闕得闕六字剛充上闕有馥其馨闕時上闕㦲冝闕帝庭内营機密闕軌闕平出上闕赫如闕榮身歿名立永場徳闕顯上闕用闕康将和闕門剖符闕景上闕來世饗右漢故膠東令王君之廟門十𨽻字為額予新獲此全碑其中白紙相去數字許如石斷裂之狀上叚十八行是叙事之文下叚少一行是四字韻語判然非一碑必是二石毁缺好事者匣而一之藏碑之家隨行翦貼故文意錯亂不可曉解其所叙有兩人舉孝㢘者有以博士召者有丞勃海者有爲太守為尚書郎爲譙令為郡功曹者其一人名字可辨曰噲字叔恭下云凡所宰莅馳化如神年四十一黄初中卒韻語有身歿名立及剖符字葢謂最後之人張氏祔於先姑疑其匹也勃海丞尚書郎則其子也所謂上世有邯鄲之功者秦之王翦也韻語初云闕二字魏后實天所授繼云文好俎豆武侯鷹揚朱旗乃舉充成帝宇則其人仕於魏初也中云伊漢中葉皇極不建又云沖質闕祚炎闕中微又云仇牧之忿奮不顧難則是述其先世前朝之事也碑云葬于京師者五世所叙既非一人又載婦姑相祔而以廟門題其額必是昭穆宗兆者碑中雖有景武孝昭沖質之文却有魏后黄初之字而題額以漢者豈膠東是其祖廟没於漢代者乎碑以喜為熹舊為奮字即顧字即赫字涪陵太守龎厷神道漢故涪陵太守昌陽龐厷神道右涪陵太守龎厷神道兩行十二字今在資州漢志巴郡有涪陵縣蜀人始置此郡此所謂漢乃劉蜀之漢也字畫差有東都體則勝於鄧乂諸碑𨽻續卷十一
