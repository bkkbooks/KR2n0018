body:
  text: 𨽻續目錄類二金石之屬提要臣等謹案𨽻續二十一卷宋洪适撰适既為𨽻釋又輯錄續得諸碑依前例釋之以成是編乾道戊子始刻十卷于越淳熙丁酉范成大又為刻四卷于蜀其後二年己亥徳清李彦頴又為增刻五卷明年庚子尤袤又為刻二卷于江東倉臺輦其板歸之越前後合為二十一卷越明年辛丑适復合前𨽻釋為一書屬越帥刋行然辛丑所刻世無傳本𨽻釋尚有明萬厯戊子所刻𨽻續遂幾希散佚朱彛尊曝書亭集有是書跋曰范氏天一閣曹氏古林徐氏傳是樓含經堂所藏皆止七卷近客呉訪得琴川毛氏舊抄本雖殘闕過半而七卷之外增多一百一十七翻葢自彛尊始合兩家之殘帙叅校成編後刋本于揚州即此本也計其書當亦如𨽻釋之體専載碑文此本乃第五卷六卷忽載碑圖第七卷載碑式第八卷又為碑圖第九卷十卷闕第十一卷至二十卷又皆載碑文第二十一卷殘闕不完而适自跋乃在第二十一卷首葢前後叅錯已非當日原書之舊矣考彛尊所云七卷之本乃元泰定乙丑寧國路儒學所刻較今所行揚州本訛誤差少然殘闕太甚今仍錄揚州之本而以泰定本詳校異同其殘闕者無可考補則姑仍之焉乾隆四十六年十二月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:e1e109f4f18ea32f1fdafcaad12826d40561b047fa2bf4bf072b5f83aa70c9a6
