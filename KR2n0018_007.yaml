front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2n0018_WYG_007-1a, image: WYG0681/WYG0681-0805a.png}
body:
  text: 𨽻續卷七宋洪适撰碑式孔廟卒史孔龢碑無額凡十八行行四十字兩元嘉二年及永興元年皆平闕司徒府司空府及讚曰亦平闕第八行制曰可髙出一字司徒公司空公題名在制可雒陽宫兩行之下與碑之下一字齊貼碑者不曉古式多有翦去制字者亦有顛倒二相題名者史農饗孔廟碑無額凡十七行行三十六字兩尚書字及朝廷並平闕時副之諸官府在尚書一行之下隔三字昔在仲尼别作行袁逢脩華山廟碑篆額二行碑二十二行行三十七字袁府君肅恭明神及京兆尹勑杜遷市石皆平闕髙祖太宗孝武竝列行髙出一字有紋如棊局樊毅脩華廟碑無額凡十九行行三十五字髙祖應道出碑一字亦有棊局之紋華山亭碑篆額二行碑十六行行三十三字西嶽至尊平闕皇帝永思髙出一字北海相景君碑篆額二行碑十七行行三十三字穿居其中在第八字之下其三行名廢兩字碑中屢稱明府獨伏惟明府一句其明府字平闕亂曰亦平闕山陽太守祝睦碑篆額二行額下有穿碑十二行行三十字祝睦頌篆額二行亦有穿其碑十五行行三十六字伊余祝君一句祝君字平闕碑之有穿在廟則以繫牲在穴則以下柩漢碑蓋多有之或有椎拓者所有爾眡其額之紙與碑不相屬者皆可疑也楊震碑篆額二行黑字有穿碑十八行行二十八字碑陰二十五行行九人穿在第二第三列之間凡複姓者十二人惟公王舉上官仲祖信成君嚴三川宣闕四人各髙出其列一字楊統碑篆額二行有穿碑十四行行三十五字孝順皇帝平闕穿在九十十一行之上漢碑額惟暈式不同或在其中或在其左右惟穿則無不居中於此碑後有餘石打碑者去之非穿之偏也碑隂故吏十五人作一横行楊著碑篆額二行黑字碑十三行行二十八字穿在第二字之下第七八行各空三字不書碑陰前後闕横五列穿在第一横之内凡空三人不書此碑複姓者五人獨相里文調髙山一字右三人沛君生亦出一字楊氏四碑幷陰皆在棊局之紋惟此碑微漫滅繁陽令楊君碑篆額二行有穿碑十八行行三十字碑陰二十一行每行六人第七列惟有一故民其中書典作者姓字每列之下各虚一字有官氏字多者則髙出其上亦有下出者穿在第一第二列之間樊安碑碑首穿暈與圉令同有額而無字若非漫滅則是首行已有標題故不再書也其題一行文十二行銘三行詔三行行三十五字詔之下空二字書年月末剰一字其間年字垂筆甚長久侵兩字馮煥詔亦同亦漢人書詔如是乎王政碑𨽻額二行文十二行行三十字鄭固碑篆額二行有穿文十五行行二十九字行間方君棊局蔡湛碑𨽻額二行文十三行行三十四字空一行方刻銘凡五行聖朝明哲平闕又空一行低二十三字刻年月續書除幷州事却與銘辭相接無空字度尚碑篆額二行有穿文十五行空三行低十三字刻立碑年月其石下闕所存者行三十二字亦有奕局之紋逢童子碑篆額一行有穿文十行字多少不等後空一行又低二十計字刻立石年月日文之上則碑漸削其鋭如錐然碑陰兩列在穿之下上一横七人下一横六人朱龜碑篆額二行有穿文十七行行三十三字有棊局之紋魏元丕碑篆額二行文十六行石已斷剥所存者行三十一字題名四行行四人直行者有線道戚伯著碑𨽻額一行十九字有穿碑十二行二十字在穿下長其上者財數寸自穿之上兩旁浸削及其顛則鋭甚碑之前五行敘其先世至稱伯著則别行呉公碑𨽻額二行有穿穿在第八九行之中文十三行行二十一字後餘數行魯峻碑𨽻額兩行有穿文十七行行三十二字郭仲竒碑篆額三行文十六行行三十五字篆用黑字郭究碑篆額三行黑字碑十三行行三十九字銘辭規歩履方之上虚一字老子銘篆額一行黑字文二十一行行四十一字皇上字平闕孫叔敖碑𨽻額二行文二十四行行三十七字最後一行書年月髙出一字穿在文中其三行各廢三字碑陰二十三行行二十字相君有三嗣平闕穿居三行之内亦各廢三字韓勑前碑十三行行三十六字第三行皇戲統華胥髙出一字後有題名三行行三人碑陰十九行行三人又有數人附其下參錯不齊周公禮殿記六行行三十八字侯成碑𨽻額十字一行有穿文十七行行三十字銘後空五字書夫人卒與下一字齊帝堯碑篆額二行黑字有穿有棊局紋碑十九行行四十四字故濟陰太守平闕後空一行書嵗月及將作吏姓名中秋下旬碑有穿兩旁有大白紋如暈之狀碑十三行行二十三字其上一半皆漫滅曹騰碑篆額二行十四字其文無存者碑陰九行行三十六字制曰平闕皇太后及先帝髙出一字碑後尚存穿之半此文皆在穿石末行以穿廢第四第五字司農夫人碑題一行文若干行行三十八字石尚餘其半亦隱隱若字平都侯相蔣君碑篆額二行文十六行行四十字後餘五行張納碑無額有穿題一行文十七行行四十八字碑陰有穿兩旁有暈前兩行題李元然存二人後十五行行五人張榮一人名氏字多侵及下列末一行書嵗月及祝頌之語清河相張君墓道十一字一行兩旁有白紋其碑長八尺餘闊三尺餘此數字之下尚有三之二謁者景君碑𨽻額一行有穿碑十六行行二十九字皇帝賻髙出三字殽阬神碑篆額二行碑十二行每行二十七字末行空九字有一人題名又空三字書年月後有題名七行第一行書丞尉郡邑名氏下有三人題名餘者每行八人又有十四人題名分别於正碑之下雖有奕局之紋而題名行列甚欹斜碑陰二十八行行十三人劉寛碑篆額二行文十八行末行低數字書門生商苞等姓名裂其上所存者行三十三字第二第十四行皆平闕而無文可考任君殘碑陰八行行二十三字楊厥碑髙祖受命平闕命字垂筆甚長所侵兩字許又空兩字方書其下一句六十七行其次序曰别行後一行低二字書趙郡等三人姓名又書王府君分遣官屬事凡三行末行低七字書魏伯王徙官每行三十字或有踈宻不齊者綏民校尉熊君碑篆額二十字作五行文十七行行五十五字財及碑之半其後空數行書文春事又空一行書杜暉事末行書年月及碑師姓名與杜春相隔亦數行許銘之後追敘君兮别作行丁魴碑十行行三十字四邉有磨紋如江原長碑上狹下闊如益州太守無名碑末行字頗多尚餘五字書於碑之末又書嵗月於首行之前桐柏廟碑無額有穿文十三行行三十三字末有兩行題侍祠官屬以春秋二字題於兩行之上春四人秋五人中無空字李翕西狹頌十九行行二十字末有一行書年月又有小字題名二行低四字許又郙閣頌𨽻頌二行文十九行行二十七字太守漢陽李翕平闕頌後又有詩並别行校官碑𨽻額下行有穿碑十六行行二十七字溧陽長潘君别作行後有題名三横列上一列丞尉三行下二列刻將作吏民各五行最後一行書嵗月與上一字齊費汎碑篆額三行碑十行行五十字穿與額相直在碑第八九十行之上其左蓋有餘石范鎮碑十五行行二十四字穿在第八九十行之間第一字之下各廢四字周憬碑𨽻額二行文二十一行行四十二字後有餘石碑陰上一列二十二人下一列前空七行所題者八人又空六行刻工師姓名何君閣道碑七行字數不等或六字或九字建武中元平闕羊竇道碑前有文六行空一行後有文九行崖石有裂絡文避石裂故字數不等少者九字多者十五字最後一行刻畫人姓字及月日廣漢長王君碑其上畫方大書一表字其下六合各有界道每行二十四字末行低四字書立石人名内王君平闕馮煥斷碑六行可見者或行有七字斷詔十八行可見者或行有九字末行年字垂筆多占一字鄭子真殘券所有者二十四行可見者行或十一字韓勑後碑文十六行字多少不等大半每行四十六七字第一行皇漢髙出一字第二行孔聖平闕文之後題名三列每列三人韓府君之下附以宗戚二人碑側兩題名各四列其一則首列三行中有祥符年題字第二列其前廢三行後有四人第三列前闕一人後六人第四列四人空兩行書孔元闓其壹則首列四行所書府君及劉翊各用兩行第二列五人空一行書石師姓名第三列七人第四列右尾二人前有太和年張咸題字上數列則有唐大中及慶歴年兩人題字就列於漢人之上劉寛碑故吏所立者篆額二行有穿文二十行行三十七字天子閔悼髙出一字穿在第九至十二凡四行之間中兩行廢三至六各四字餘兩字各廢第三字禹廟宗秀方題名兩横列上一列二十一人下一列二十人題名之上有唐開元中龍門令所作頌張表碑篆額三行有穿文六行行二十五字劉脩碑𨽻額二行文十三行行二十五字熹平米巫題字七行字大小疎密不等多者十六字少者九字鉅鹿太守金君闕四旁皆刻磨紋郭旻碑十篆五行題滿其額文十二行銘四行後有三行書重立碑之事行二十八字石已下斷有得之不全者髙彪碑𨽻額二行文十五行直有界道後一行書嵗月及范府君立碑事行三十九字馮緄碑篆額二行十字有穿在第五字之中文十四行行三十四字將軍體清守約平闕後空三行書威宗得諡之因李翊碑十行行四十一字李翔夫人碑有穿文十二行行三十六字歎曰别作行穿在最後三行金恭斷碑有畫方之紋上亦有穿題一行文十行後餘三行所存者行十三字中山相薛君成平侯劉君斷碑額四行凡二十四字碑二十行前兩行題二君官位所可見者行有八字嚴發殘碑十二行行十字雍勸闕十大𨽻兩行其文一面五行一面三行行二十三字第七及第十五字下皆有横畫第一重惟首行及第四第五行則七字餘皆虚其下一字魏脩孔廟碑篆額一行有穿文二十三行行四十二字制詔皇上聖皇三行皆平闕魏脩老子廟詔十六行行八字後兩行書年月下一叚有唐人題字魏大饗碑𨽻額二行有穿穿旁有刻螭之紋磨滅不全文十九行行二十字魏公卿上尊號奏篆額二行文二十二行四十九字先王及髙陵兩武王三陛下皆平闕有奕局之紋自陛下即位後十行刻于碑陰二陛下亦平闕篆額黑字魏受禪表篆額一行文二十二行行四十八字先皇及陛下五皇帝皆平闕亦有奕局紋篆額黑字右碑式一卷漢人書碑有畫方井井若楊太尉者有行間疎密不等若逢童子者有重文贅其旁若景北海者有首行尚左若孔梁相者有尊敬君上而文出其列若華嶽碑者辭或隔行事或空字大率與名西强來式法不同予疇昔藏碑隨得隨剪既成𨽻醳思欲存古人之制乃傾囷倒廩參之以假借得其全者則筆之雖然自我作古者滔滔皆是吾恐人用覆醬瓿也𨽻續卷七
