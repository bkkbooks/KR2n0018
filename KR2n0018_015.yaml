body:
  text: 𨽻續卷十五宋洪適撰石經儀禮殘碑上闕郊請反闕七十一字以君命聘于闕六十八字善乎授上介幣闕六十九字賜使者幣使者闕六十八字上介至亦如之闕六十八字練冠以受聘闕七十字哭出袒闕七十一字食歸下闕上闕取闕七十四字嘗闕七十二字佐食闕四字于闕六十七字卒闕四字相闕六十五字取闕坐闕三字興闕二字俎闕六十五字堂復位至婦闕足闕于闕六十五字爵闕六字儀下闕右石經儀禮殘碑一段八行上下皆糜碎行多者六字少者二字聘禮之文也前五行乃使還反命之儀後三行乃出聘遭喪之儀一段十行二十字士虞禮之文也漫滅泰甚僅有數字隱隱可認非板本尋繹安能得之因知此碑每行七十三字鴻都遺刻獨此最為難辨聘禮曰使者歸及郊請反命朝服載旜􅓙乃入陳幣于朝西上上賔之公幣私幣皆陳上介公幣陳他介皆否束帛各加其庭實皮左公南鄉卿進使者使者執圭垂繅北面上介執璋屈繅立于其左反命曰以君命聘于某君某君受幣于某官某君再拜以享某君某君再拜宰自公左受玉受上介璋致命亦如之執賄幣以告曰某君使某子賄授宰禮玉亦如之執禮幣以盡言賜禮公曰然而不善乎授上介幣再拜稽首公答再拜私幣不告君勞之再拜稽首君答再拜若有獻則曰某君之賜也君其以賜乎上介徒以公賜告如上賔之禮君勞之再拜稽首君答拜勞士介亦如之君使宰賜使者幣使者再拜稽首賜介介皆再拜稽首乃退成周之時朝覲廢而盟會講列國相聘結轍於道往反禮容骫曲僃具靖康建炎間邉馬南牧己酉年先公張旜請和抵雲中聽命於其帥尼堪繼徙冷山十有五年然後歸紹興之季金人犯廣陵其明年壬午仲弟往尋盟隆興之季復入淮壖其明年乙酉豫銜命至燕館其邸十日四見其君燕射訖禮到闕與上介便服對內殿再拜升階奏使事賜坐飲茶而退既弛擔件所得之物以聞駭步就賜以所點一二物隨以獻得告三日涖職如初古禮病於太煩今日之儀無乃太簡乎成臯令任伯嗣碑上闕三字字伯嗣南郡編人也其先蓋任座之苖胄君少履岐嶷純懿之闕五字仁而有威仕極州郡舉孝廉除郎中蜀郡府丞江州令以服去官辟闕二字茿陽侯相延熹五年七月遷來臨縣正身帥下賞恭罰否存恤寒苦闕三字右官朝家靜姦軌撿手繇賦平均黔庶不擾基月有成政由豹産闕三字七州闕衢路委蛇郟河阻凶崩阤虧齧峻峭危難君發𢎞謀慮斯闕三字南移北徙俠就寬直柱枉字匹曲以險為安隤高夷窊顯敞平端功業廣闕三字悅歡然後乃探闕索隱厲貞禮孝興文偃武修序畔校菩著消頑闕二字易撡威恩並行闕十四字南蠻拔扈荆部闕三字周遷君桂陽銜闕十五字夫織妾仿偟道闕一字豫何英追送隨慕君未到郡先騰檄告諭以信義繩以憲度狂校醜類闕二字畏怖或豫降服或走逃竄居民安業商旅通濟不戰而寇息罰未加如闕二字斯可謂德應神祗獲水闕之助垂曜於旡窮者已是以都邑謡詠慕昔闕二字甄勒勛績永昭于後乃作頌曰闕惟任君政不世出慈寬惠恕剛猛桀掘應期濟時來牧我國仁垂義種闕二字德伸屈潤稿理寃省結受施既浹升輿南翔西征東怨萬民攸望鐫表闕頌億載彌彰右任伯嗣碑其文云延熹五年以築陽相遷來臨縣存恤寒苦姦軌斂手繇賦平均黔庶不擾移徙衢路修序畔校遷守桂陽都邑詠慕甄勒勛績蓋去思碑也碑之中鑿方為竅廣四寸長五之疑曽用之為碑趺趙云碑今在汜水乃漢之成臯也帝紀延熹八年桂陽胡蘭復反太守任胤背敵畏懦棄市胤即伯嗣之名碑言君未到郡先騰檄告醜類畏怖或降或竄不戰寇息則先聲亦可嘉矣不旋踵而難作夫以銅章課最進把州麾夙盜盤結罹此酷刑禍福倚伏惜哉以軌為宄檢為斂墓為暮由為猶郟為夾匹即正字漢安長陳君閣道碑永建五年孟春下漢安長蜀郡青衣陳君到官闕五字約垂意惠民施無為之政行不言之教德化流行盜賊闕少五榖豐茂百姓晏然各得其所君思所以利民大小悉備此道本有根閣二百餘支闕三字穿字陷壞絶車馬疆頓常以農時發民闕治嵗嵗造雯直丗餘萬君躬自案行以眇思省去閣令就土著長無勞費為萬世基百姓行人歡悅歌咏郵亭掾尹厚闕二字臣有述君之義故勒此石以示後賢其辭曰惟此故道險阻危難閣厄闕臨江緣山秋雨水水字􅕙闕二字陷車馬疆頓隧隕顛行旅創苦發賦加民乃至于今遭我陳君舍道施德蹈義履仁治合中和化行若神清過夷齊行同參騫以身率下非禮不言思惟儉約所以利民追哺闕飯露宿草闕百姓安樂不勞不煩又省此閣就乎平便民無經賦行人離患時丞馮卿廉約勤勤好施樂闕欽承奉宣掾史遵憲各建忠闕咸闕百福子子孫孫闕時道福掾董闕二字右漢安長陳君閣道碑漢安舊屬犍為今為資州內江縣字未見所出所謂閣者猶李翕郙閣何君尊楗閣之比碑載陳君到官年豐盜息思欲利民此道有根閣二百餘丈臨江緣山險阻危厄秋雨水潦穿陷壞絶車馬僵頓行旅苦之嵗嵗發民修治費三十餘萬陳君躬自案行省閣就土行人歡咏郵亭掾尹厚勒石作頌頌後又稱邑丞馮君與掾史欽承遵憲之美末有道橋掾董君姓名順帝永建五年造碑以疆為僵隧為墜參為參眇為妙下闕數頁前闕闕然字畫有東都氣象非魏晉筆法校官掾者東都郡縣之吏屬公乘者漢爵第八級東都紀元有熹平延熹光熹亦有書光熹為光喜者漢人作𨽻好假借或是借喜作熹作喜又作熙光字恐史策之誤但𢎞農王四月即位改中平為光熹是年二月猶是中平西晉惠帝雖有永熙而改元亦是四月此碑非光熹永熙明矣俟博古者剖判之交址刾史石羊五字闕址刾史闕君羊右刾史羊五字今在郴州二十里外荆榛中第一行有址刾史三字上滅其一當是交字第二行有君羊二字上滅其一土人謂之鄧君家闕文乃其姓也此蓋墓道石羊膊上所刻如州輔天祿辟邪之比漢武帝置交趾刾史在十三州數中東都因之杜佑通典云獻帝時以交趾刾史張津交趾大守士燮有請改刺史為州牧至建安十八年復禹貢九州省交州入荆益帝紀自靈帝以前屢書交趾刾史事迹傳中載交趾事却多作交州蓋是要其終而言之但郡國志自中興以來直云交州不載廢置本末可謂闕文此獸乃建安以前之物永初官墼文永初七年作官右永初官墼七字數十年來眉州人掘武陽故城時或得之范至能在蜀得其二分其一相贈二墼惟七及官字文有反背不同重有十八斤𨽻續卷十五
