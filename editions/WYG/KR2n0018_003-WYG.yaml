  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2n0018_WYG_003-1a, image: WYG0681/WYG0681-0772c.png}
body:
  text: 𨽻續卷三宋洪适撰建平郫縣碑建平五􅏵六月五㑰范功平史石工􅌛徒本長廿五丈賈二万五千右建平郫縣二十九字建平者哀帝之紀年其五年已改為元夀矣此云建平五年六月者與周公禮殿碑相類殆蜀道未知改元耳此碑却無篆體乃西京之佐書也隸法雖自秦始葢取其簡易施之徒隸以便文書之用未有㸃畫俯仰之勢雖西京之世學士大夫不留意此書故彞鼎所識碑碣所刻皆不復用之觀此數字可見當時之書法也郫者蜀郡之邑此碑近出於蜀中名之蠶崖碑當是略其地名也碑之始則書年月其次書掾史又有石工之文而云長二十五丈必是鑿崖治道如何君尊楗趙尉羊竇之比其未記其所費故云賈二萬五千巴官鐵盆銘巴三百五十斤字永平七􅏵弟廿七西右巴官鐵盆銘十六字顯宗永平七年造建中靖國初黄魯直自戎州東歸厥弟叔向攝邑巫山有大鹽盆積水堂下以植蓮芡魯直去其泥而識之其文鑄出鐵上故雖有發筆而勢不可縱人或指以為篆首行惟有一字如一而反最後一字如西而有連筆魯直以為前刀而後酉亦謂之秦篆又以斤為戊皆誤也太尉劉寛神道二漢太尉公諱寛字文饒漢太尉車騎將軍特進昭烈侯劉公神道右劉公神道二刻其一曰漢太尉劉公諱寛字文饒其一曰漢太尉車騎將軍特進昭烈侯劉公神道各有一螭蟠屈平其上而下作獸如彞鼎間饕餮之象當是雙闕所刻漢隸太字不用點獨高頥及此碑有之字法與正碑相類圖畫則㣲拙不及王稚子沈新豐之精也劉公𦵏於洛非僻陋遐逺之域自昔訪石刻録古事者惟知上東門外有門生故吏兩碑耳俱不知更有此刻信乎天下之放失舊聞皆若是也丹陽太守郭旻碑君諱旻字巨公有周之裔下闕十八君膺天休闕三明徳矜下闕十八為衮可測加體明道術下闕十七然獨少仕州郡宣著嘉名察闕十六省其傷疾完命已免於月下闕十六書侍御史刑頗憲如䂥下闕十六除拜郎中治書侍御史彌絳下闕十五里作孚九郡咸寧河􅃋凱徵拜下闕十五朝異焉是時淮夷蠢迪帝官綏下闕十四逺齊逸俗通聖化民康移風易下闕十四惟莫反初􅏵過耳順疾􅯠穨延熹元下闕十三言絶矣諸子曷仰三載禮闋迺羣相下闕於休我師恂恂郭君既明且眈此下闕十三上闕一字易輸勤讃理師放紛三典執下闕十三上闕一字機夙夜惟獫蠻憬彼用綏海濵下闕十二上闕三光暉有翕永世不泯上闕一是泛子故五原太守鴻議郎及𦙍孫范下闕十一改前文葢用眳明祖􅈴徳􅎧宣􅓤情庶傳􅄇下闕故漢故丹楊太守郭君之碑篆額郭君名旻太尉禧之兄也仕至丹楊太守以威宗延熹元年卒三載禮闋諸子已刻墓道之銘矣而碑石狹小加有瑕瘢後十餘年當孝靈光和之二年其從子五原太守鴻因𦵏太尉公遂與其孫范不改舊文重立此碑今石已横裂首行失其下十八字末行所失十字文闕其半矣趙氏猶及見其全者中有彌縫衮之文而失其下一字時郭君為治書侍御史葢謂彌縫衮職也西漢丹楊郡則治宛陵丹楊縣則今之建康也東漢史皆作丹陽隸刻如費鳳嚴訢碑亦然說者謂郡北有赭山故云此碑以丹楊題之者通用前朝字也西晉移部於建業元帝改太守為丹陽尹地里志云山多赤柳故名而它書載漢晉此郡無從木者至唐天寳年始以京口為丹陽郡改曲阿為丹陽縣郡縣皆非漢舊壤也西漢志丹陽云楚之先熊繹所封案史記周封熊繹於楚居丹陽徐廣注云在南郡枝江縣秦齊破楚屈匄遂取丹陽即其地東漢志亦云枝江侯國有丹陽聚班史所注乃以丹陽為楚子始封誤也即膺字即豫字即克字即嚞字般即瘢字嚴訢碑惟漢中興卯金休烈和平元年歳治東宫星屬角房月建朱鳥中吕之均萬物慈躬華澤青䓗蚑行蠕動咸守厥常人物同授獨遭灾霜徂字落木􅄇寛𢎞經設三命君獲其央􅏵六十有九禮勝蚤天嗟痛嗚呼悲故著名誄字嚕嘆㱆欷發嘖憤字授筆字舒慮矌喟其辭曰伊漢嚴君諱訢字少通兆自楚壯祖考相承招命道術治嚴氏春秋馮君章句衆浻􅄇覽君軆性慈仁棠窅闕二忠清白好善博愛有文有武闕二兼僃幼為郡掾史㑹稽諸暨尉字烏程毗陵餘暨章安山陰長以疾去官後為丹陽陵陽丞守春榖長舉㢘遷東牟侯相闕四字作下邳祝長典牧十城所在若神宣布政聲闕二甘棠貧細隨附賢士敬名行歌謠慎於所闕五鄭與相似恩澤奐昺闕五名臧文威如哮虎仙南徳配公劉闕三宣為二風闕二至今􅄇滅􅏵闕七何億掩忽摧臧闕三於是官送君莫􅄇悲哀舒氣唁闕二後宫貴人上闕二君魂靈柩闕四農夫桑婦嘆欱闕二人偅復優目闕三哀闕二嗟君闕四云斯適闕七字身甘復闕五次子闕三昔先子女斯闕三有命􅄇可追㽞嗚呼哀哉何棠所宰十城布化垂光明功名休盛魏難障今歌於道闕三甘棠君􅄇享黄耉夀霣没定定字且於中嶽𤣥照洞倉𢎞高顯闕五刻畫文堂列種諸奇樹何禍魂審有知福祚遺子下闕右嚴訢碑無額政和中出於下邳漢人銘墓皆一律此碑先書其所終嵗月及夀考有嗟惜之辭踰百言始云伊歎嚴君諱訢字少通遂述其行事與費鳳兩碑略相似銘詩亦五言列種諸奇樹一句又同豈此碑亦卜君所作乎訢所厯者諸暨尉烏程毗陵餘暨章安山陰長丹陽陵陽丞春榖長東牟侯相祝長年六十九以威宗和平元年卒其云嵗治東宫星屬角房月建朱鳥中吕之均者謂庚寅四月也又云治嚴氏春秋馮君章句兩漢傳春秋嚴氏學無姓馮者葢史之闕文也此碑東牟侯相之下長之上闕四字趙氏作下邳祝漢無祝縣葢亦闕其一字下邳本屬東海東海則有祝其疑此邑嘗割隸再今之仕者視典縣如探湯或捷徑以避之雖驅以三尺不過壹再為之即止訢游宦數十載八綰銅章多在今江浙之間雖漢人不卑小官自安其分亦王事易集民俗醇厚然後可以屢居其職也長興施元之徳初既見隸釋博求闕遺轉搨此碑以贈我句中有脱字者俟見石本當正之碑以央為殃以億為意以掩為奄龍門禹廟宗季方題名宗季方賈冬方王伯卿王伯敬趙仲方趙仲都宗元政賈元周賈伯常宗蓋宗奴桃后進桃石起王仲與王子桃世起王酉子王孟宣王叔祖王回尹阿禄尹宣祖趙盛趙阿王他柱王萬金王景宣桃他郡賈疆春王君博王景陽賈元輔宗石郭阿胡陳政陽王仲宣馬安國左池云四陵仲武王通國王元方右龍門禹廟宗季方四十一人題名百二十有四字趙氏録禹廟凡二碑皆在龍門其一有皮氏長劉尋丞樊璋姓名而無陰其一有皮氏長安定蘇字而文已磨滅其陰則有汾陰趙遺數十人姓名官爵及西鄉亭長劉昱等名最有龍門復民三十五户人名此碑二列有四十一人姓名疑是龍門復民而多少與趙說不合葢别一碑也其間有尹阿禄郭阿胡與靈臺殽阬二碑陰相類又有王酉子桃他郡宗石處左池云數人俱非士君子名字也複姓有四陵一人亦姓氏書所無者題名之上有文十餘行乃唐開元中龍門令吕延祐所作禹廟頌楚順八分書亦猶魏子廟碑後人刻於石之空處耳使趙氏有此則當録於唐碑之列也米巫祭酒張普題字熹平二􅏵三月一日天表鬼呉胡九闕二仙厯道成𤣥施延命道正一元布於伯氣定召祭酒張暜萌生趙廣王盛黄長字楊奉等諭受㣲經十二卷祭酒約施天師道法无極耳右米巫祭酒張普題字凡七行六十七字今在蜀中威宗熹平二年所刻范史劉焉傳云順帝時張陵客於蜀造作符書受其道者出米五斗陵傳子衡衡傳子魯其來學者初名為鬼卒後號祭酒注云熹平中妖賊大起漢中有張脩為太平道張角為五斗米道使病人處静室思過祭酒以老子五千文都習為請禱之法此碑有天師道法及祭酒鬼兵字而云受㣲經十二卷葢諸張妖黨指傳授之約觀其詞以是姓胡老初入米社中故召諸祭酒受以經法頗合史氏所載此碑字畫放縱欹斜略無典則乃羣小所書以同時刻石雜之如瓦礫之在圭壁中也隸釋前已不收以其亦熹平遺刻遂復録之𨽻續卷三
