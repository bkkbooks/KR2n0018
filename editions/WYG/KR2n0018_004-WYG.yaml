body:
  text: 續卷四宋洪适撰魏三體石經左傳遺字右漢三體石經左傳遺字古文三百七十篆文二百十七隸書二百九十五有一字而三體不具者皇祐癸已年洛陽蘇望氏所刻蘇君有言曰後漢熹平四年靈帝以經籍文字穿鑿疑誤後學詔諸儒讎定五經命蔡邕書古文篆隸三體鐫石立於大學今石不存本亦罕見兹者近於故相王文康家得左傳搨本數紙其石斷剝字多亡缺取其完者摹刻凡八百一十九題曰石經遺字即小歐陽集古目中所有者慶厯中夏文莊公集古文四聲韻所載石經十字葢有此碑所無者而碑中古文亦有韻所不收者則淪落之餘兩家所得自不周耳石經見於范史帝紀及儒林宦者傳皆曰五經蔡邕張馴傳則曰六經惟儒林傳云為古文篆隸三體書法酈氏水經云漢立石經於太學魏正始中又刻古文篆隸三字石經唐志有三字石經古篆兩種曰尚書曰左傳獨隋志所書異同其目有一字石經七種三字石經三種既以七經為蔡邕書矣又云魏立一字石經乃其誤也范蔚宗時三體石經與熹平所鐫並列於學宫故史筆誤書其事後人襲其譌錯或不見石刻無以考正趙氏雖以一字為中郎所書而未嘗見三體者歐陽氏以三體為漢碑而未嘗見一字者近世方匀作泊宅編載其弟匋所跋石經亦為范史隋志所惑指三體字至公羊碑有馬日磾等名乃云魏世用其所正定之本因存其名可謂謬論夏氏所注古文說以此碑為石經又水經之事實辨二史之牴牾己定一字遺經為漢刻矣續得蘇氏此碑益喜前說猶墨守也厯古所疑於今始判㑹稽所鐫隸纂亦存三體數十字使來者有以取信焉即率字即蠢字魏下豫州刺史脩老子廟詔告豫州刺史老耼闕五孔子闕五魯為孔子立廟闕三桓帝闕四政闕二而事老子欲闕十一由桓帝闕五老子闕三我屋朕亦以闕四行者闕五樓屋闕二黨能嚴故更脩正昨温闕二秋闕八往禱闕二樊其宣告吏民闕二聞知如故事黄初三年十月十五日子下右魏下豫州刺史修老子廟詔其文曰告豫州刺史云云如故事黄初三年十月十五日此或與漢詔同苦縣濄水北有老子廟水經云廟前南門外有漢碑北有雙石闕甚整頓在闕南側魏文帝黄初三年逕譙所勒此碑凡十三行行八字其磨滅者大半其前有魯為孔子立廟字葢援先聖為比也其間稱漢帝者再葢東京惟威宗尊祠老子帝紀載延熹八年而遣中常侍至苦祠老子祭祀志延熹九年帝親祠老子於濯龍文罽為壇飾淳金鉛器設華葢之坐用郊天樂故魏詔再三言之葢是詔豫部修祠之事當時刻之於闕也碑後歳月日之下闕子上一字按四分厯是年十月壬戌朔則十五日為丙子日碑之下方有唐開元及天寳間題字數十行乃真源縣令邵昕記祠醮投龍等事真源屬亳州今曰衛真即漢之苦縣也魏甄皇后識坐版圅文昭皇后識坐板函右文昭皇后識坐板函八字紹聖丙子年鄴民耕地得一緑石匣廣八寸有半長倍之厚三之一鹿頂笏頭葢其上有此八字魏文帝甄皇后神坐前之物也故嘉興守林衡之父時為相之臨漳令摸得之其字乃魏隸之工者傳於世既鮮故士大夫罕見魏史黄初中𦵏甄夫人於鄴州帝以母氏之故追上尊諡别立寢廟此乃明帝時所刻者魏大饗記殘碑唐君元巃西人太守先闕三大饗記陳留謝渡舊樂孫有而仰廬一何過可間章興足天趙宋岷東畢方承髙范㑹東中山時亦童晉唐景寛安定反厯陶陽剔前僧山仲喜其人堂廚衆將望月刑庶時卒為氣維黄初三年月闕三文為書千秋萬代闕二主重居外天地始至里文王大嚮之皇高徒集有之魁萬名一據東西南術復歌歎麗建起尚盤古羅天為感續於其闕二樵室去殆冠獲不我是憤漢則瑞為至府右大饗記三古文為額其第三字不能識以其辭中有記字故名之此碑二百餘字損者四之一所存之文殆不可曉獨有黄初三年字其書法頗與魏受禪相近文帝大饗六軍立碑於譙在是年之前兩載此書饗作嚮或是假借受禪碑葢鍾繇所書此碑黄初年月之下有一字其左从䍃而闕其右疑是繇字或云碑在長安瑶臺等謂之鍾繇殘碑姑傳疑以俟知者巃即隴字晉右軍將軍鄭烈碑君諱烈字休林熒陽將封人也其先出自宗周建國於鄭因胙命氏君其後也逺祖亢節著徳揚光漢氏之初近葉以儒術博古顯名中興之後遝至曽祖先生皇祖徵君蹈明哲之高尚嘉肥􅋟而􅄇悶將作大匠實有茂徳載在國䇿君應中和之醇靈總文武之𢎞略清識妙於妍機聡聲贍於燭物踐逸軌之逺迹確然之大節故維夙罹造而能令老成之徳居無擔石而能厲氷霜之潔是㠯英材邈於羣萃至行侔於在昔初上計掾辟司隸車騎將軍府轉參寧朔將軍事除魏令其為政也仁㠯施仁則靈恩衍于春陽壯以發令則神威肅於秋霜末俗變而歸本芳物勃而為萌𤣥澤洽於朔都忠良反於南州文皇帝為相國親覽萬機詶咨俾乂君㠯盛徳冝登王佐遂典喉舌賦政於外百揆時序庶事無廢皇猷顯融光被遐裔五等初建封平莞男聖上踐祚拜騎都尉賜子一人爵闗中侯遷馮翊太守于時獫狁孔熾西土不浄鄗方有戎馬之塵邊邑覩燋烽之警君震臣神武㠯仁惠威懷允著寛猛相濟遷北軍中候典司禁戎董導羣帥明鑒審於官材清風激於在位正義形於聲色衆望儼而祖畏故六軍之政咸當而請謁之言莫至遷兖州刺史加輕車將軍流化河濟馳風區外音振于天末遺嚮暢於呉㑹遐邇肅齊萬里是賴寢疾留乞還京輦徵拜議郎享年六十太康二年秋八月丁巳薨悠悠縉紳莫不傷心愠天道之無誠哀邦家之喪鎮子乃命使者奉䇿追贈右軍將軍印綬諡曰僖侯於是故吏殿中監申揚等相與永思盛徳言時計功昔龔父鏤烝夷之鼎魯人著泮宫之頌乃伐石建碑刋表茂庸俾清風奮于百世遺乎無窮其辭曰峨峨嵩嶽中夏之鎮於鑠僖侯含徳之純英齊宣朗窮理入神龍蟠道淵振曜景雲北臨魏邦百族時雝登讃聖皇五典克從回守舊京威風折衝還司六軍肅清天互出牧萬里𤣥化􅇓通委辭名位帝嘉厥庸迢贈寵服㠯顯高蹤勒銘金石日月是同太康四年七月十日辛未造右晉故右軍將軍平莞僖侯鄭府君之碑隸額鄭君名烈滎陽人仕於晉初至兖州刺史輕車將軍召拜議郎以太康二年八月卒故吏申揚等立此碑四年之七月也鄭君所封其上一平字則曉然可識下一字額已損而銘辭亦㣲缺僅若莞字趙氏以為東莞則誤也晉縣亦無平莞非鄉名即亭名也余嘗以魏末至晉宋隸字無可取者晚獲此碑其勁健方格顧後絶配若雜置漢刻中未易甄别孰謂秦無人焉士君子被褐懷寳枯槁巖壑之下響不徹於一皋名不揚於後世與此碑等者多矣可勝歎哉稽山石邦哲熈明聚碑頗富今亡矣假之其子祖禮諸石有固問莊問兄弟亦出其所藏故能成書於越末得尤袤氏張駒氏數種旁搜逺取因以補前書之闕尤張皆第進士博雅之秀也碑以嚮為響以縱為蹤𨽻續卷四
