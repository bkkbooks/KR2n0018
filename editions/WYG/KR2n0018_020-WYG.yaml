body:
  text: 隷續卷二十宋洪适撰􅚌彰長田君斷碑上闕先髙祖時以吏二千石自齊臨菑從充闗中冠盖金上闕祖字興先為執金吾弟䬃漁陽太守孫􅘉光武中興上闕堅仕郡為主簿督郵護羌從事討畔夷元初元年上闕遭家不造三嵗喪父事母有柴頴之行年廿復失所上闕戀松柏憔顇毁瘠禮制除乃始斿學治韓詩孝經上闕究道初仕為縣主簿功曹郡諸曹史帳下司馬上闕國劉君招命署議曹掾假除百石遷補任尉鉅鹿大上闕假印綬守廣平夏曲陽令􅚌彰長養春陽討惡上闕包斯去官朞禮未竟楗為王君復請名署平闕案獄上闕亰兆長陵君詣考所肆極毒痛身不膚闕字趙卒上闕史見勞芳馨馥芬􅘉閒逺近顯署仁徳兼督郵防上闕平二年秋七月􅃦疾不豫朝共爪牙家霣紘覆遐尒上闕古樂道不羍早終不白勝字升臺少為縣功曹郡曹上闕盈改於戊乃刋勒金石以旌眀徳其辭曰上闕公清佐職百里兼領三城安惠粅儀伐討姦輕當極上闕身殁名立永載萬零熹平六年十月九日􅉝酉造右􅚌彰長田君斷碑所存其下一段與趙氏所藏者同文雖半亡遺字一一明白碑云其先髙祖時以吏二千石自齊臨菑徙闗中祖興先為執金吾弟䬃漁陽太守孫布光武中興云云史記髙祖徙貴族齊田氏闗中後漢傳朔方人田䬃引兵至單于庭迎盧芳入塞帝紀建武七年盧芳所置􅃋方太守田䬃舉城降則􅚌彰蓋諸田之後碑云二年七月卒而缺其年名末有立碑嵗月始知物故在熹平年但􅚌彰非所終之官趙氏强名姑仍其舊碑云守廣平夏曲陽令􅚌彰長繼云以色斯去官後從楗為王君之召碑缺不得其所歴次云京兆長陵君詣考所肆極毒痛身不膚撓其時黨事方作恐嘗就逮次有兼督郵防字其下闕文防乃縣名之上一字銘辭中斷莫得而考􅚌彰非書柩之官明矣漢碑書地名用字假借與史策不同甚多下圭菀陵文陽汁邡是也鉅鹿之四邑曰任曰廣平曰下曲陽曰􅚌章碑以夏為下以彰為章不可謂史䇿之誤田君為任尉而兼字廣平三邑令長故銘云佐職百里兼領三城名勝字升臺者其次子也不幸早終者其冢子也碑中字札嫵媚甚類華租華山亭碑書之者好用奇字如西漢志北地有有大縣子虚賦羂䮍注古要字字書眥與瘠同字書或馘與若同國字闕字游字居字署署字於字禮之類皆它碑所無者獨字未詳碑以􅈛為邇以為窄以零為齡堵陽長劉子山斷碑君諱木字子山平通侯之𤣥孫假下闕承烈考闕四字之行􅁱春秋經蒹該下闕明郡歴主簿督郵五官掾功曹史以下闕彼蠻宼騷蠢邦域出師暴軍混沌闕年下闕懐怵惕之心偽闕求闕二字為闕二字劇縣撫之以仁為省繇役并闕鮮下闕綏之斯來動之斯龢各安其土化行亐下闕属城名與豹産為疇時大駕南征廵下闕君惟衰闕則以權上書自表乞歸郷下闕拜郎中闕三字子道太夫人遂以壽終下闕恭臺閣哀此下民數納直言不畏彊禦下闕壽闕三字奈年􅕊有一建寧元年下闕存有美闕亡有髙諡於是乃刻石銘下闕於闕君天闕從苻闕承𦙍緒不忝先下闕嘉諸闕不定闕四字之拜為王臣下闕君其闕謀闕四字凡百品遺勛下闕陳留外黄申徒商字文陳留外黄闕理字元高陳留外黃魏字興逺陳留外黄申徒稱字公舉陳留外黄劉當字子敬陳留濟陽何夙字子羽陳留下闕又闕上闕七字字成闕上闕六字字元闕陳留下闕川闕四字字公闕潁川許劉松字伯闕潁川闕陰闕四字直下闕二人潁川舞陽陳舞字元闕銀汝南宋公陳闕字伯闕汝南安成黄休字伯闕汝南邵陵闕珪字季才梁國睢陽張䂓字莭榘梁國睢陽許憲字奉則梁國睢陽李邵字伯南梁國寧陵夏侯闕字安公梁國寧陵沈闕字子直勃海脩張扶字幼起勃海脩吳方字闕珪勃海脩王璜字子珪勃海脩張儉字君則上闕五字字世闕平原安闕三字字闕二字平原平原闕二字字仲臺上闕五字字漢侯平原安徳闕二字字武衡上闕五字字季張平原平原闕二字字通闕平原濕陰闕𢎞字闕二字平原安徳闕二字字闕二字𢎞農陸渾延闕字季子𢎞農陸渾延祥字漢𢎞農陸渾闕二字字伯闕𢎞農陸渾張闕字定闕𢎞農陸渾張闕字充闕河南闕劉闕字元和鉅鹿廣平李勛字文祖北海劇王綝字文闕安定臨涇郭撫字子寧太原中都侯汶字文林太原下闕平原濕陰下闕河南闕髙闕字父闕上闕二字平闕上官下闕汝南上蔡闕二字字公闕上闕二字陽下闕勃海脩闕二字方字闕平右扶風茂陵李偉字世􅐋潁川新汲朱祺字闕二字陳留襄邑闕二字字闕二字酒泉延壽下闕陳國長平郭周字公闕闕三字水彭闕一字仲闕陳留酸棗闕􅐋字闕二字陳留外黄陳闕字叔闕汝南上蔡陳闕字闕二字陳國長平闕二字字闕二字平原平原劉闕字闕二字右宗俱碑陰額上六大篆曰門生立碑人名正碑甚刓滅碑背所損却不多上下凡四横書其人郡邑名字略無官稱當是門生未筮仕者故吏不應無碑不傳於後世爾汝南上蔡令神道闕故汝南上闕令闕二字父闕神闕右汝南上蔡令神道今在閬州城外一石闕其東面刻十三字與王稚子闕相類蜀人謂之汝南令闕眎其文南之下一上字甚分明蓋汝南之上蔡令也徐求閬苑記以為唐貞觀中旌表王氏義門所立謬也侍中楊文父神道漢楊侍中文父之神道右侍中楊文父神道字體格與馮幽州闕相似必西州所刻者比干墓四字殷比干墓右殷比干墓四字水經云朝歌縣牧野比干冢前有石銘隷云殷大夫比干之墓今已中折不知誰人所誌大觀中㑹稽石國佐有此四字比水經又闕其三字畫清勁乃東都威靈時人所書者收碑如歐趙皆未之見右侍無名人墓闕漢右侍之墓光和三年右漢右侍之墓五字藏碑者宣和間中分為兩黏裝作帙漢官有左右署侍郎漢人題闕作碑多省文如郭仲奇為北軍中候而碑中省其北字髙頤作北部府丞而題闕省其部字馮鯤之右郎中署字於文闕省此侍字之下必有漫滅之文為貼碑者所翦其左有光和三年四小字貞女羅鳯墓闕漢貞女羅鳳墓右漢貞女羅鳳墓六字筆勢甚清􅇣頗類景謁者墓表字之上以朱爵為額蓋墓闕也种氏石虎刻字光和七年四月五月己丑孝子神覽元愽所造右种氏石虎刻字光和七年孝子种覽元博所造趙氏得漢代兩墓石獸膊上字宗資天禄辟邪是篆文州輔二獸所刻予訪之未獲延年益壽椁題字永初七年四月丗日造焉向是萬嵗延年益壽郭右延年益壽椁文三行十八字今在蜀中安帝永初七年造謂之萬嵗延年益壽椁當是壽冢中所刻如梁相孔耽碑之類建初中曹叔文汝伯寧甎皆有萬嵗舎之文恐彼亦是壽藏之物尉府靈壁甎文磗文原闕右尉府靈壁甎文四行十二字成帝陽朔四年造西漢字見於彛器者皆是篆文此甎分行作棊局大眼數字略有隷體與㑹稽路都尉闕頗相似謾以殿其後趙徳夫云士大夫考正前代遺事其失常在好奇孔子曰君子於其所不知蓋闕如也予謂建元名年不止西都有之鄭三益闕全是晉人筆札趙乃定為武帝時碑深誤後學闕如之戒若何資州重刻燕然銘自竇憲之後誰曽再登此山若當時椎柘者無緣留到今日兼東都之初石刻未如此齊整一見可知其偽隷釋惟嚴發一碑可疑或是好事者所撰𨽻續卷二十
