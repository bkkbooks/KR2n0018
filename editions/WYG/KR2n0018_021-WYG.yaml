body:
  text: 𨽻續卷二十一宋洪适撰自書𨽻續卷後𨽻釋有續前後共二十一卷乾道戊子始刻十卷於越淳熙丁酉姑蘇范至能增刻四卷於蜀後二年霅川李秀叔又增五卷於越明年錫山尤延之刻二卷於江東倉臺而輦其板合之越延之與我同志故鄭重如此凡漢𨽻見於書者為碑碣二百五十八甎文器物欵識二十二魏晉碑十七欵識二欲合數書為一未能也今老矣平生之癖將絶筆於斯焉庚子十一月洪景伯書附録殘碑主記史武當趙㑹闕元門下賊曹武當張禮仲文議曹掾陰㬊武偉議曹掾㭊呂系系字仲嗣議曹掾陰吳音惠聲議曹掾酇毛端元平議曹掾酇李紀元生議曹掾筑陽文機永度議曹掾武當頓甫康闕議曹掾酇王舍建闕議曹掾武當元和凱明議曹掾丹水馮嶷林元議曹掾筑陽趙奨時助議曹掾順陽郝奨令緒議曹掾武當樊廣令之議曹掾丹水張僉令宗議曹掾酇厲温顯相議曹掾酇何奉聲議曹掾酇張代叔融議曹掾筑陽梁習休伯議曹掾南鄉夏勃士平議曹掾南陽郭仲泰議曹掾南鄉應昂光闕議曹掾陰虞方𢎞伯議曹掾順陽董彦邵聲議曹掾順陽郭沐叔𢎞議曹掾順陽樊􅎇永闕議曹掾順陽潘澹偉靚議曹掾順陽祭造始平議曹掾陰何永臣宗議曹掾南鄉夏怡士奕户曹掾酇李肅季穆議曹掾南鄉黄种道思金曹掾陰陳惲行元賊曹掾陰鄧嘉孔仁右兵曹掾陰終祈叔英科曹掾丹水張悝宣苐中部督下闕又闕一人北部督郵順陽闕和潁季監江督郵順陽王寳偉興中部勸農筑陽闕斐令元南部勸農南鄉閻沃泰宗北部勸農掾陰代竫公密從掾位筑陽闕二字季齊從掾位南鄉王晧景林從掾位陰潘立偉業從掾位武當晉原季闕從掾位陰陳良偉之從掾位酇冨虞偉仲從掾位丹水杜儉温恭從掾位武當楊誕廣明從掾位筑陽趙泰英從掾位武當樊宫建興從掾位順陽郭夏惠峕從掾位順陽郭真惠聲從掾位酇邵審元度從掾位陰終敞建明從掾位酇鼂軌令真從掾位陰終恢偉然從掾位南郷應憬元先從掾位順陽何旻偉之從掾位武當趙凱景伯從掾位武當王的淵泰從掾位陰婁綜子業從掾位酇張爽文列從掾位順陽何闕徳配從掾位順陽杜建伯闕一人從掾位順陽張羲叔宗從掾位筑陽王審士先從掾位筑趙審文固從掾位酇厲明顯闕從掾位陰馮兆惠林從掾位丹水闞祇元威從掾位南鄉謝林長茂從掾位南鄉夏載闕文從掾位順陽宋闕三字從掾位丹水張楊延列從掾位酇呂善元甫從掾位㭊傅儀顯則從掾位酇李羡闕休從掾位南陽郭闕長先從掾位武當樊闕長興從掾位陰闕二字林之從掾位筑陽闕勍獻之從掾位㭊朱邵長闕從掾位順陽馬􅒼元友從掾位順陽程闕尢宗從掾位陰潘韶偉武從掾位武當闕武偉慈從掾位丹水蔡仁令伯從掾位陰婁煒興伯從掾位順陽王本長元從掾位順陽王仕宣林從掾㭊謝邵季甫從掾位陰婁文興仲從掾位武當謝沖長從掾位酇張肅泰恭從掾位酇魯良武和從掾位武當張粲𤣥盛從掾位筑陽張秀和明從史位順陽五肅仕元從史位㭊鍾釋景良從史位陰陳永建宗闕一人從史位筑陽胡憲偉章從史位順陽杜和建穆從史位武當李他文子從史位筑陽李紈臣先從史位陰鄭邵顯伯從史位順陽龔𢎞宣林待事掾武當王宗長謀待事掾陰申定士則文下闕文學史武當韓兾泰博文學史酇周緝令熙文學史陰㬊超公叔文學史酇樊斐宗明文學史順陽郝元凱明文學史筑陽張弼季輔文學史南鄉樊紹士先文學史武當謝闕子闕曲將闕部司馬武當鄭旻康葉部曲將禆將軍下闕部曲將武猛中郎順陽何興偉林部曲將闕二字校尉下闕部曲將禆將軍武當張始元闕部曲將武猛都尉南鄉趙立公始部曲將闕二字校尉南鄉闕二字承闕又闕一人部曲將闕六字陽胡訢延伯部曲將武猛中郎將陰李章孔文部曲將武猛校尉順陽闕邵偉元部曲將裨將軍武當魏端文闕騎闕將裨將軍筑陽胡襲闕業部曲將軍司馬下闕部曲將武猛中郎將闕四字英闕部曲將武猛都尉酇張銓叔行副部曲將廣野將軍酇周釣宣代𨽻續卷二十一
