body:
  text: 𨽻續卷十七宋洪适撰魯峻石壁殘畫象右魯峻石壁殘畫象二石並廣三尺崇二尺水經云金鄉山司隷校尉魯君家前有石祠石廟四壁皆青石隱起自書契以來忠臣孝子烈婦孔子及七十二弟子形象象邊皆刻石記之此石上下三横首行一牓云祠南郊從大駕出時次有大車帳下騎鮮明騎小史騎凡十六牓大車之上一牓三字上兩字略有左畔偏旁似是校尉騎字車前兩旁鮮明八騎歩於中者四人鈴下三十餘騎如魚鱗然列兩行横車之後後有駙馬二匹帳下一騎小史執幢四騎次横薦士一人有牓奏曹書佐主簿車各一牓有車馬騎史僕射二騎鈴下二騎各有牓第三横冠劔接武十有五人人一牓闕里之先賢也次石上横兩牓云君為九江太守時車前導者八人後騎石損其半少前一牓云功曹史導有車馬車前二騎牓滅中横但刻雲氣下横十有六人形象標牓與前石同後漢志大駕鹵簿五校在前按魯峻碑嘗厯九江太守終於屯騎校尉從駕南郊乃屯騎之職藏此者不知為何人碑既有九江標牓又有屯騎職掌更有先賢形象定為魯峻石壁所刻其誰曰不然考孔子家語史記七十子傳邽子斂名巽梁子魚名鱣商子木名瞿左子行名郢縣子期名成樊子遲名須顔子栁名辛冉子産名季顏子路名無繇叔子其者叔仲㑹也史作子期子魯者姓冉名孺子象者姓縣名亶子景伯者子服何也唐劉懐玉作孔聖真宗録以子服景伯在七十子之間求子斂者疑是漆雕哆地皇候録書七作來韓勑碑書漆作漆雕哆字子歛恐此求字是漆之省文縣子期史作子祺姓駟者恐是壤駟赤子偃恐是言游如顔子思襄子魯襄子孺數人姓字分明與史家異同魯棖史記作申棠家語作申續檀弓以申詳為顓孫子張之子史家不能次以為両地音聲如此則傳聞異辭無足疑者又二石長過於此其一之上横盡圗人物如武梁畫象主坐客拜侍於前後者六又主客三人列坐侍者四中横三車如雍丘令畫一車導騎二一車兩人在前一車一人在後屋下之人三五賓主三車有標牓皆湮滅下横十七人如前石所圗聖門高弟人亦一牓一字不可認其一則上横七騎皆右馳中横二車一有一導騎一則倍之末有五人在屋下二稚子在屋上下横兩氈車皆駕以一馬人一車有導騎二末有五人在屋下立車皆有牓惟四導騎者上下各一字粗可認上曰君下曰郎魯君再為議郎豈謂是乎以其冠劔人物絶類九江石壁所畫疑此二石亦是魯祠四壁者汪聖錫家有此碑後漢志列侯㑹耕祠導從中有鮮明卒未氏畫史朱浮墓石壁人物有鮮明隊或者不能細認先賢姓氏但見有鮮明數牓遂謂是朱浮墓壁畫象非也予前書以功曹史門下督殘畫為朱浮墓中物亦非也碑以觧為鮮以偅為憧以廌為薦太尉公墓中畫象㐲尉公西侯右將軍韓侯子本髙陵侯以上畫象未錄右太尉公墓中畫象八石近嵗出資州内江縣蜀人謂之燕王墓人物未知何所依據乾道中一蜀士入官中都持贈同寮人始知之訪求累年茶馬使朱景仙召還以之相遺一石横四尺髙二尺有半兩巨人髙坐右方有㐲尉公三字左方有右將軍韓侯子本七字又一石七人分坐三席其中一席二人題其左曰髙陵侯右曰西闕侯人物字畫比前石甚小漢碑書太尉太守之類大字皆無㸃字書有㐲字與大同音注云海中地名从人从犬者則是倚伏之伏此碑所云㐲尉公蓋是用伏為大即太尉公也石在壙中可以不出姓幷與髙陵二侯省之何也建武中右將軍官廢漢末方復有之益州十二郡國二百年間五人為三公至太尉者南鄭李固成都趙戒戒之孫謙二趙在桓帝獻帝時成都去内江不逺豈其冢墓耶畫象則二立石髙五尺上有朱爵相向右禽之下刻一人物長且三尺衣冠甚偉左右刻一牛首銜大環如江原長碑大尉之石坐後各一奴下有兩禽髙陵之石兩璃横其上三席之下有舞劔者戲錢者胹鼎者使令之人凡廿其一有祭樓人坐其下一人前跪𨽻續卷十七
