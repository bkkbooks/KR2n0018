body:
  text: 𨽻續卷十八宋洪适撰荆州刺史李剛石室殘畫象右荆州刺史李剛石室殘畫象一軸髙不及咫長一丈有半所圗車馬之上横刻數字云君為荆州刺史時前後導從有騶騎有歩卒標牓皆湮沒在後一車碑失其半止存東郡二字向前一車車前有牓惟郡太守三字可認前後亦有騶騎步卒及沒字牓又一車僅存馬足泰半無碑少前六騎形狀結束胡人也其上亦刻數字惟烏桓二字可認漢長水校尉主烏桓騎又有䕶烏桓校尉此以烏桓為導騎必二校中李君嘗厯其一所圗列女傳三事其一三人車一馬一無鹽醜女齊宣王侍郎凡三牓車前一牓無字其一四人三牓惟梁髙行梁使者二牓有字此二列女武梁碑中亦有之其一四人樊姬楚莊王孫叔敖梁鄭女凡四牓後有一牓而闕其人水經云鉅野有荆州刺史李剛墓剛字叔毅山陽髙平人熹平元年卒有祠堂石室三間四壁隱起彫刻君臣官屬龜龍麟鳯之文予聞閩人李丙仲南得此碑於西州馮方圎仲宛轉假借書欲絶筆而得之酈氏所載古碑百餘惟李剛魯峻二墓有圖畫趙氏雖云曾得魯君畫象而碑録中無其目此碑則自求好古之士未之見今東州久淪異域石刻少有存者淮漢以南聚碑之家無幾𨽻釋所有僅七種除武梁之外餘碑他無别本數十年後紙敝墨渝耽古之士撫卷太息亦猶今日之閱水經也𨽻續卷十八
  hash: sha256:8b977004c3cb019ada6771d29e5b15b905d02925ff6c8635d0da7b74a757bd39
