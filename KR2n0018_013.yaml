body:
  text: 𨽻續卷十三宋洪適撰豫州刺史路君二闕君故豫州刺史溫令元城令公車司馬闕開陽闕謁者議徵試博士畫象未録上闕馬皆食下闕㑹稽東郶􅚾尉路君闕永平八年四月十四日庚申造東都冡墓間石刻傳于後世者自此始趙氏云建武中省諸郡都尉唯邊郡有之豈會稽邊海故置此官歟任延嘗為㑹稽西部都尉而此云東部疑㑹稽分東西部各置都尉史不載爾豫按衡方碑亦嘗為㑹稽東部都尉乃威宗之時則東都蓋有此官未嘗併省范史雖不具載而它書亦可稽據畫象未録右豫州刺史路君二闕前門七行二十一字書其所歷豫州刺史至徴試博士凡八官後闕亦七行二十一字云㑹稽東部都尉路君闕其次書造闕年月日永平之八年也字畫兼用篆體前闕人物之後小字一行却是隸文豫州前後各一人執杖負劔嚮字立東部之前亦一人執杖負劔又有一人正面立腰下垂佩兩手各有所執末亦一人執杖負劔而其前又有一人側面嚮字立手中亦有所執蓋是墓前雙闕如王稚子髙貫方之類但二闕無姓名此其異爾東部說在前卷王稚子闕畫象右闕南面漢故先靈侍御史河內縣令王君稚子闕右闕西面漢故兖州刺史雒陽令王君稚子之闕畫象未録右王稚子二闕前書已釋其文矣額上六字亦已見之隸續西州所存漢人墓闕其石方數尺間有闕者上琢樓屋為蓋如今寺觀中經幢蜀帥范至能盡圗其八面相贈闕之兩角有斗斗上鐫耐童兒又作重屋四壁刻神像人物車馬之類亦有漫滅者先置二字在右闕南面稚字在北面子字在東面雒陽二字在左闕西面坐蓮之像四左右各一小兒其像頂冠若祠剎中所謂天王者獅象之間其僧四乘馬者四人引車者二乘車者五以繩曵獸者一人中獸而立者亦一人耐童兒二十七人神體不具者有三龍一象一師子八其六在五角獸面四半體者五車馬模糊辨不能盡蜀工椎拓二闕才有一車二馬乃石壁兩隅所刻者靈臺碑陰㑹計作碑之費二十千二百爾武綏宗使石工孟季為其兄造闕為錢乃十五萬孫宗作師子亦四萬則一闕之費比碑十倍王君二闕至今不毁其耐久如此日利千萬曽羊沛相范皮闕畫象未録右沛相范君闕碑録云劔州梓潼縣東有沛相劔門范皮墓闕字不多記姓名而已圗經縣東六里有范伯皮闕蜀人云范君有二闕周回十六字多磨滅今在鳯凰山寺前麥田中前嵗有劔州罷官歸者以此郡三石闕畫象相贈其一則三車四馬人物九凡三段謂之范君闕其一則二車五馬人物十四凡三段謂之鄧君闕其一則人物五飛鳥一凡二段謂之魏君闕其上無一字收之者甲乙差紊容或有之豫既編之隸續成都亦已鋟木矣近得范君一闕其上橫刻四字尚可認曰府君神道字之下所刻四人物乃是前所謂魏君闕者次橫又有一馬最下三方有白紋其中似嘗刻字闕上四人皆向右行更有一石其人却向左行恐是范之右闕非身到碑下不可辨也闕旁之甎堅厚如石其重十斤田夫耕墾時或得之上有小篆韻語每甎十行行一句一在汪聖錫家其文云嗟痛明時仲治旡年結偅孳孳履踐聖門知辨賜張闕噍孔言寬博闕約性能淵泉帶徒千人行無遺愆豫亦得其一云積德未報曷尤乾坤茂而不實顔氏暴顛非獨范子古今皆然想貌睹刑列畫諸先設往有知豈復恨焉石上姓名雖淪滅而甎文有范子可證乃知范君名皮字仲治圗經誤衍伯字更得一斷甎直書一行存其下千萬曽羊四字却是隸文汪氏亦有之存其上日利千萬四字漢代器物銘多以羊為祥鄧君畫𧰼未録闕右無名人墓闕畫象三段三車六人皆駕一馬乘馬于車前者一人橫旗于車後者二人始豫得劔州三闕指此為范君者又有魏鄧二闕皆石上橫刻人物車馬無一字可考近得范君一闕凡數橫上有數字所刻者乃是魏闕人物豈此車馬却是魏君之闕乎二闕俱是畫象當入碑圗卷中姑贅于此隸續卷十三
