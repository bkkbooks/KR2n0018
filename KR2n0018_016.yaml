body:
  text: 𨽻續卷十六宋洪适撰黄龍甘露碑碑文前十行闕其羣臣列名録後上闕一人司徒臣姓名闕安漢將軍下闕又闕五人侍中臣闕立侍中下闕尚書下闕又闕四人五官中郎將臣姓名闕太中大夫臣姓名闕中散大夫臣姓名闕博士臣許慈議郎臣姓名闕議郎臣闕信議郎臣闕光議郎臣姓名闕又闕二字將軍臣姓名闕鎮東將軍臣劉琰平西將軍臣劉闕平北將軍臣劉闕又闕二字將軍臣姓名闕又闕二字將軍臣姓名闕第二横並闕第三横闕十八人又闕一字將軍臣姓名闕又闕一字將軍臣姓名闕又闕一字將軍臣姓名闕又闕一字將軍臣姓名闕又闕一字將軍臣姓名闕又闕十字將軍臣姓名闕又闕一字將軍臣姓名闕又闕一字將軍臣姓名闕第四横闕十二人又闕一字將軍臣姓名闕又闕一字將軍臣姓名闕又闕一字將軍臣姓名闕又闕一字將軍臣姓名闕又闕一字將軍臣孫闕又闕一字將軍臣闕仁時太守南陽李嚴正方丞宋逺文竒武陽令陰化第二碑惟建安廿六年闕十字赤水水字甘露闕亐縣中後闕碑隂上闕六人侍中臣闕立侍中下闕尚書下闕又闕二字光禄大夫臣姓名闕又闕二人中散大夫臣劉闕博士臣許慈議郎臣姓名闕議郎臣姓名闕議郎臣孟光議郎臣姓名闕下闕人又闕二人益州前部闕二字臣費詩益州左部司馬臣姓名闕益州右部司馬臣姓名闕益州闕部司馬臣姓名闕益州部蜀郡從事史臣姓名闕益州部闕二字從事史下闕益州部闕二字從事史闕義校尉臣姓名闕益州部巴西從事史闕信校尉臣李闕益州部梓潼從事史忠節中郎將臣姓名闕益州部牂柯從事史臣姓名闕益州部永昌從事史闕字校尉臣姓闕益州部闕山從下闕又闕五字從事史臣姓名闕闕六字業校尉臣姓名闕又闕二字中郎將臣姓名閥又闕二字中郎將臣姓名闕闕二字中郎將臣劉闕又闕二字中郎將臣姓名闕又闕二字中郎將臣姓名闕又闕二字中郎將臣張闕又闕二字中郎將臣姓名闕又闕二字中郎將臣劉闕又闕二字中郎將臣姓名闕又闕二字中郎將臣姓名闕又闕二字中郎將臣姓名闕下闕右黄龍甘露之碑二𨽻額皆六字不磨滅碑中有穿各髙五尺餘大者廣三尺次二字華陽志云建安二十四年黄龍見武陽赤水九日乃立廟作碑蜀志次年曹丕既滅漢太傅許靖安漢將軍糜竺等上言武陽龍見君之象也與博士許慈議郎孟光立禮儀上尊號至次年登壇即位大碑之文十行僅有數字可辨羣臣列名居石之二上下四横每横二十餘人可辨者侍中二人司徒尚書五官中郎將太中中散大夫博士各一人議郎四人安漢鎮東等將軍二十餘人官之下皆稱臣姓名碑側題太守李嚴並丞令二人姓名嚴後改名平次碑之文十四行惟首行有建安廿六年數字可辨碑陰存者上兩横每横三十人可辨者侍中議郎從事史中郎將數十人兩碑俱有許慈孟光題名則立石非同時也建安二十五年漢祚已終次年四月蜀主方稱帝改元則辛丑之春蜀人猶奉漢代正朔故有建安二十六年之文兩横之下崇寧中為王時彦所磨刻其説二碑皆有額却云其一漫滅李嚴大字一行皆可讀却云所存十字如是鹵莾輙敢鐫勒武陽在漢屬犍為今為眉州彭山縣北海相景君碑陰故中部督郵都昌羽忠字定公故門下督盜賦劇騰頌字叔逺故門下議史平昌蔡規字中舉故門下書佐營陵孫榮字卋榮故門下書佐淳于逢訢字闕成故騎吏劇麟字敬故吏朱虚孫徵字武闕故吏營陵薛逸字伯踰故吏營陵闕鴻字中闕故吏都昌吕闕字孟闕故吏都昌張畼字元故書佐都昌羽質字闕傚故書佐朱虚鞠欣字君大故書佐平壽淳于闓字久宗故書佐營陵徐曽字曾華故書佐都昌張朔字朔甫故書佐淳于孫悝字元卓故書佐營陵鍾顯字闕寳行義劇張放字公輔故書佐劇乗禹字陌度故書佐東安平闓廣字廣宗故書佐劇紀政字卋堅故書佐淳于孫晄晃字字威光故脩行都昌台丘暹字世徳故修行都昌董兮方字字季兮故修行營陵􅕂岑字字漢興故修行都昌冀遷字漢久故修行營陵是盛字䕶宗故修行營陵闕暹字武平故修行營陵臨照字景燿故修行都昌張䮚字臺卿故修行營陵淳于登字登成故修行營陵顔理字中理故修行營陵水丘郃字君石故修行都昌呂興字世興故修行都昌逢進字世安故書佐劇徐徳字漢昌行三年服者故書佐劇姚進字元豪凡八十七人故書佐劇邴鍾字元鍾故書佐都昌張翼字元翼故脩行都昌張耽字季逺故脩行劇中闕字季逺故脩行平壽徐允字佰允故脩行淳于趙尚字上卿故脩行都昌段音字世節故脩行都昌齊晏字本子故午營陵是遷字世達故午營陵􅕂敏字元成故午淳于董純字元祖故午營陵繻良字世騰故午朱虚炅詩字孟道故午都昌台丘遷字孟堅故小史都昌齊冰字文達故小闕都昌張亮字元亮豎建闕一字惟故臣吏慎終追逺諒闇沈思守衛墳園闕綱禮備陵成宇立樹列既就聖典有制三載闕二字當離墓側永懷闕三字不闕勝以義闕志乃著遺辭以明􅍏意魂靈瑕顯降闕嘉祐右景北海碑陰三列故中部督郵故門下督盜賊故門下議吏各一人故門下書佐二人故騎吏一人故吏四人故書佐十五人行義一人故脩行十九人故午六人故小吏二人第三列姓名之下又云行三年服者凡八十七人末以兩行刻四言韻語十八句脩脩二字隷法只爭一畫書碑者好奇所以从省借用趙云故午者不知其為何官案百官志載郡縣吏屬自曹掾之下有書佐有循行有幹有小史此碑故午六人在循行小史之間隷文幹字其旁从二从干或从一从午蓋是幹字省文婁壽碑朱爵司馬亦官名也省爵為脩字皆省作攸亦此之類嗚呼三年齊斬天下之通喪也西都以日易月羣下化之短喪廢禮薛宣謂三年服少能行之者兄弟相駮暌乖異同翟方進續母既葬三十六日除服視事薛翟二公當時皆在相位降及東都上下一律安帝始聽大臣二千石刺史行三年喪不四年復斷威宗嘗聽刺史二千石行三年喪不五年亦斷見之碑碣司隷魯峻以母喪乞身徙議郎則解組居廬僅行於下僚爾繁陽令楊君上虞長度尚以叔父憂西鄂長楊弼以伯母憂思善侯相楊著以從兄憂廣平令仲定以姊憂皆解官而歸趙圉令有兄之喪則不應司徒府之辟當其時二千石已上不行三年之服而令長小下闕數頁前闕顯節山陽防東夏州叔舉山陽金鄉張諺季德河南闕陵闕堂世萇河南下闕河闕成睪闕香伯闕南陽闕四字伯道南陽闕五字表南陽南鄉闕三字逺濟陰闕五字表濟陰闕二字張鳯季節山陽昌邑田𦙍元尊任城闕四字世明任城闕二字朱翔元舉任城元父李能叔逺右奔喪右王元賔碑陰四横稱故吏者四人有名字郡邑者十餘人餘皆凋落不備其中有立碑錢各五百之文又有右奔喪右斬杖三年之文歐趙有其碑而亡其名碑云門徒雨集盛於洙泗故衰杖過禮等於事父惜乎碑石淪碎姓名不能盡見歐云碑有錢各五百字似是脩廟人所記其可見者濟陰定陶蔡顥子盛山陰金鄉張諺季徳河南宛陵趙堂世長南陽南鄉鄧升升逺濟陰成武周鳯季節又時有故吏字不知為何人祠廟按此碑既有故吏又有奔喪斬杖之文謂之脩廟人題名非也成宗延熹四年立繁長張禪等題名長蜀郡繁張君諱禪字仲聞故郡掾楊甫字季山郡掾楊雄字孟孝議曹掾楊除字伯議曹掾楊立字元宰從掾位楊棠字子夷郡文學師楊胡字升海五大夫楊賞字伯騫五大夫屈畼字進騫校官掾謝就字孟直民杜孔茂民楊伯章民闕伯著縣例掾杜長字子陽夷淺口例掾趙㥄字進徳夷侯李伯宣夷侯楊伯宰夷侯牟建明夷侯杜臣偉夷侯杜永嚴夷侯屈孟遼夷侯資偉山夷侯萇竟舒夷侯養達伯邑長爰文山邑長闕宰闕邑長闕小君邑闕四字邑長蘭世興邑君宋闕二字夷民闕三字夷民闕度山夷民李伯仁夷民闕三字夷民爰闕世夷民闕長生凡世八户造白虎夷王謝節白虎夷王資偉丞蜀郡司馬達字伯通左尉武都孫眞字子尼右蜀郡繁長等題名一石三横今在蜀道首行云長蜀郡繁長君諱禪字仲聞其次題掾曹十人及三民姓名次横之首行云夷淺口例掾趙陵字進徳次夷侯九人邑長三人第三横邑君三人夷民六人後云凡世八户造末有四行髙出兩字題白虎二夷王及丞尉名字最後兩行及其下一横字畫差小似是紀事之辭惟夷王謝資數字分明餘皆不可讀東都益部郡縣夷漢錯居此必蜀郡太守有徳政繁縣夷人共立此碑尊其官吏故書之前列苑史西南夷傳安帝時青衣道夷邑長令曰舉土内屬帝増令田爵號奉通邑君則邑君邑長皆夷酋之稱也史載蜀郡徼外有白馬國莋都之西有白狼國無所謂白虎國者秦時有白虎為巴蜀之害募能殺之者賞邑萬家閬中夷人登樓射殺之即板楯蠻之先也又赤穴巴氏子乗土船能浮衆共立之為廪君既死魂魄世為白虎所謂白虎王者豈此二國之别稱乎帝堯殘碑隂史仲闕叔惠闕千五百史仲闕六字百故功曹從事闕仁下闕行義民闕本闕二字錢三百闕士陳國闕四字錢闕百處士闕二字劉闕三字錢百處士任城曹闕孟闕錢二百處士闕一字張𢎞輔國錢二百上闕陳國梁闕二字珍元闕錢二百上闕成陽令陳國闕眞字闕鉅脩闕立碑闕二字祭闕中殿上闕石坐三上章闕二字緹惟四闕一以致神坐遷中山相上闕主簿山陽闕三字字闕玉闕即闕二字為闕更美右帝堯殘碑陰開元中濮州刺史趙冬曦磨其上數列刻所作祭文止存其下一列有故吏處士九人題名後四行紀事無上文可讀傳者以為堯廟碑陰考其中一行有云成陽令陳國闕其一下有眞字案堯廟碑中成陽令乃河南吕亮帝堯碑則是成陽令陳國鄭眞知此乃帝堯碑陰也上一列磨不盡者尚有百及千字數處隷續卷十六
