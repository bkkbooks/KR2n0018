body:
  text: 𨽻續卷一宋洪适撰郎中王政碑君諱政字季酺漢中太守之孫從事掾之第三子也姿履闕三穆之慘愛敬以事生哀以送終奉闕三歐陽尚書研典賁侃闕三上闕四童冠聿集承義方闕十三郡端右州辟從事闕二衛上先公闕三有羔羊之潔申棠之欲不營已好是正直仰不闕六守防東長威闕雙行帥下以儉決訟朙民闕二淫佚革弭閭里闕二風化宣流家闕二施舉孝㢘除郎中三署馳名見者宗當豐人爵登彼闕二神命闕四罕脩仁不卒從氛暴年五十以元嘉三年春正月戊寅闕三既歿而不於是門徒士夫君闕二咸有闕二乃相與立石表行以後其辭曰於朙君方白時言樂笑曲徑不曲職左公事君蹇諤退食􅓟私逶虵允仁慈闕三讓忘闕三清潔已惟徳之宅有嘉厥聲令聞碩養俟闕四夕階不闕六以勒銘昭厥徳右漢故郎中王君之銘隸額在濟州王君名政字季酺厯州從事防東長察㢘除郎其夀五十以威宗元嘉三年正月戊寅卒門徒士夫相與立此石字雖殘闕尚多可讀者歐陽公云磨滅不復成文名字官閥卒葬年月皆莫可考葢察之不詳爾小歐陽以為其字季輔趙氏以為光和元年立皆非也碑云有羔羊之潔無申棠之欲鄭司農注魯論云申棖葢孔子弟子申續家語申續字周史記申棠字周此碑所用有自來矣碑以賁為墳即慼字􅓟即絶字平輿令薛君碑惟延熹六􅏵春二月平輿令薛君卒烏虖哀哉吏民其咨咨君之徳迺建碑石于墓之側其辭曰􅋋皇降徳于兹㦱君㦱君祖官有世功迺侯于薛苗𦙍被分作漢卿尹七世相承君之懿徳性比㳤真如氷之潔如玉之堅糜術不綜㒺禮不遵忻忻之至三族㠯敦美名委質宣昭令聞升州入宰眪乎其勛莅政已吾爤而有成遷典平輿匪威匪仁猛㠯濟矣惟清化未期月遘竺旻吏民穆卜嘗禱屏營旻天不弔不遺君䁆􅘈薨徂命不可國人巷哭若喪厥親白號怛童穉唫呻嗟嗟酷痛如何旻乾靈柩旋歸比穸窀􅥒􅥒士㑺側爾酸辛婣族畢素縞庭於是吏民乃復追歎君初舉孝三署播名愛佐戎來臨汝南剖符之貳千里同塵料揀賔好此徽聲貢奇達異迥酌清英遺風令歌礼夫不愃云君回軫誰不裹歡意迷流乃隕乃顛如可贖也人百其身昔邵臨國民謂之父今也薛君追蹈厥緒身殁言存是謂不朽于㦱吏民悲慕􅘩已刋石紀銘永昭于後右漢故平輿令薛君碑隸額前有敘凡三十六字大略云平輿以延熹六年二月卒吏民咨其徳建碑于墓之側次有銘詩三百四言文雖無缺而不書其名字其云我君肇祖迺侯于薛者謂夏之車正仲也又云作漢卿尹七世相承者西京有御史大夫廣徳沛人東京有千乘太守漢淮陽人其傳云世習韓詩父子以章句著名元和姓纂云薛公獻䇿滅黥布其𤣥孫曰廣徳而千乘又其𤣥孫也平輿豈其苗裔耶其云君初舉孝三署播名則知其以孝㢘為郎也又云莅政已吾遷典平輿則知其嘗治陳留之邑也又云來臨汝南剖符之貳者汝南治平輿縣葢以縣令為郡守之貳也又云昔邵臨國民謂之父者謂南陽太守召信臣也薛君為令而云追蹈厥緒者取其循良而用之不以守令而拘也詩云永矢弗諼禮云終不可諠兮二字葢通用此則借愃為諠也揚雄傳纍既夫博説注云古攀字此銘以君功承堅南清諠攀數聲為一章詞句鏗鏘若合音律漢人作銘頌用韻多如此韓文公此日足可惜詩出入聲韻中正用此體即肇字貭即質字爤即爛字即寛字即憖字賔即實字褱即懐字竺亦音篤碑云遇此竺旻恐旻亦借用司徒掾梁休碑上闕二休字元堅葢闕二之苗裔也下闕載踵勳業文武相濟君曽號稱三下闕郎中早終君纂考鴻軌體履懿敬下闕為主動以禮讓為先每在同儕推人抑己下闕而後流馨香播越名實先登仕郡厯五官下闕淑瑋遂察孝㢘除郎中光禄主昭徳塞違下闕韜光翳燿隠身殉道隘窮不悶匪令始實下闕通四海之閔除禁防既釋辟司徒府府秉忠蹈㛃下闕勞滿奏上拜新都令謙為自劾寢疾於家季六下闕有二月戊寅卜𦵏太守安平趙府君嘉厥高下闕父之美宋敘三命之伐􅔅有五名歿宜見旌下闕守節曰貞博聞曰文請諡休為貞文子爾乃祏下闕詞曰上闕二文允棘勤典素精孔墨高難隠深不測下闕紫極遐罻潛伏靈闥張鼎弍掌既盈命下闕𤣥石勒立堂祠跱神徳歿不朽傳兆右司徒掾梁君碑篆額惟存掾碑二字碑録云荆州穀城有司徒掾梁君碑建安廿七年立此黄武前一年也豈呉人尚用漢厯乎否則誤字也梁君名休字元堅為郡五官掾厯郎中光禄主下闕一字辟司徒府拜新都令有大𦵏日月而闕其所終太守趙君相與諡之曰貞文子銘詩以三言為文梁君終于宰邑而以公府掾書其額者重内也東都光禄雖有主簿而戴就傳云舉孝㢘光禄主事注引風俗通曰光禄奉肹上就為主事此碑光禄主之下闕一字未可斷以為簿也其云禁防既釋則鉤黨也又有韜光翳耀𨼆身殉道隘窮不悶之句銘則云遐罻罔退潛伏皆謂黨事當是時天地閉塞邪枉熾結闗三木錮五族者盡天下之名流其得幸免者葢鮮矣中平初黨禁始解久幽之士信睂而復起梁君遂從聘召更二十餘年而卒郡將至於累衍論議宜不在夏恭范丹之下史策既沒而無傳集古如歐趙又遺而不録㡬不得比於婁壽魯峻因碑碣以著見石雖存賴它書而得其姓士之澡身厲操而能垂光於後者亦難哉㛃即字祏即柘字防東尉司馬季徳碑上闕四年九月廿九日故山陽府卒吏防東守尉司馬字季徳闕二先出闕五氏之苗裔也闕二三代常為侯伯周武克商其𦙍族闕四仲闕三施於民迄千闕二濟其美不霣其功闕二金銀翼衛闕四熾下闕于季徳幼有聲闕四文惠恭接物耽古好學闕三褱道下闕五闕六箴規闕二克誦其詩既優闕六明允篤誠不闕三小畏慎如臨于左公明明委虵其徳徳闕三肅下闕壽黄耉永享五福猥遭溫疾喪友華榮下闕郡人諸友鄂驚闕二㑹集涕霑下闕發舊它消邢幽門百兩旁幡送者悲下闕徳金石播闕三魂而有嘉寵休烏虖哀哉右山陽府卒吏防東守尉司馬君碑其名闕其字季徳有所終之日月而其年則摩滅陳勝傳云勝攻陳陳守令皆不在獨守丞與戰譙門中張顔並注為郡守縣令又云郡守之丞故曰守丞司馬氏索𨼆曰秦無陳郡皆字是衍文守令與守丞同守非官也劉敞原父云是陳縣之攝令游俠傳王游公謂茂陵守令尹公曰君辱原涉如是一旦真令至復單車歸為府吏注云守茂陵令未真為之𨽻釋有羊竇道碑云青衣尉趙君到官六日郡召守鐵官長積四月徙守成都令後還歸尉官又金鄉守長侯成碑云郡授五官掾功曹守金鄉長即家假印綬周憬碑陰有湞陽守長南平丞寋祇三人者亦是以它官攝事此云山陽府卒吏防東守尉者以郡曹而攝邑官其本秩自如故猶今之兼權也防東二字頗䁆昧難辨故趙氏以山陽卒史名之自三蒼滂喜亡李斯作蒼頡篇揚雄作訓纂篇賈魴作滂喜篇名曰三蒼滂喜漢和帝時作郎中以𨽻字三三蒼𨽻法始廣小學不絶如綫字書行於世者篇莫加於類篇韻莫善於集韻所載𨽻古以石刻校之則攟摭尚多脱略𨽻法皆以悠作悠此碑又省作稽之篇韻咸無焉聊因論此擬急就之一章云滴喜悠悠􅍦繼滂喜悠悠獨無繼出袁良孫叔敖司馬君鄭固劉寛楊厥碑一字出者不再見隷灋昘丗𨽻法乖離昉中世出繁陽令無極山張訥孔耽袁逢戚伯著富春丞碑斷藉斷圖籍載一二出楊厥孟柳孔耽元賀魯峻祝睦平輿令碑氏羲農出費汎老子清河相碑邦舜禹出鄭固帝堯孔廟碑終春秋出孔宙孔謙楊碑陳魯陳鄒魯出楊震孔宙袁良碑戔暴剗暴嬴出潘乾孔宙郭仲奇碑禽霸楚出孔耽魯峻袁良碑穻基宇恢出劉脩孔躭靈臺碑䟭啓劉祚出逄童周憬祝睦碑夔䕫棄出苑鎮劉寛剡令碑鼂弻朝弼聚出楊厥張夀孫叔敖碑􅝳葉曹解葉曹出逢童華山亭北海相碑吕吕孟祖上二字出孟郁下宗俱碑禮秉典禮出帝堯祝睦孔和碑渡垂律度出孔耽樊敏孟郁碑偄顯儒術顯出魯峻孟郁郭仲奇碑屢爵禄屢出綏民校尉杜尚李碑風霜露星電風雲霜露星電煇出夏氶郭仲奇衡方李翕高彪周憬孟郁碑盙簠籩壺兕鼎彞上出孔宙次三字出韓勑餘出孔宙楊厥三公山孫相碑椶馥犧黍稷香馥薦血犧出三公山史晨袁逢祝睦次二字靈臺下帝堯碑滌䄢滌齋蠲禱靈嚮歸出蔡湛淮廟孔彪蔡湛帝堯孟郁孔和碑麟鳥獸鼠蚌䲫麟龜出孔耽樊毅唐公房靈臺唐扶孔宙戚伯著碑道邊過䢫道邊通達遭過隨出高彪劉脩唐扶宋恩武梁馮焕劉熊碑湥出測洋奥表出之出袁良孔謙著碑吳公韓勑唐扶孔耽戚伯凡此之類皆非假借字書所不應棄蔡伯喈奉熹平之詔列鴻都之碑晚學咸所取正未嘗一字好奇也如前急就雖曰漢人典刑亦石經之所不取今之學者事不師古乃縁手隨筆變點畫篹偏旁以取新尚怪為能間有所據不過晉魏以後事體此膏肓之疾也碑以鄂為愕以邢為形即彌字中山相薛君成平侯劉君斷碑益州刺史中山相薛下闕巴郡太守宗正卿成下闕惟二君下闕神府乃下闕平文武下闕祭死者下闕薛劉征討輕下闕曰下闕賢勞下闕墅下闕功下闕今下闕右漢故益州刺史中山相薛君巴郡太守宗正卿成平侯劉君碑隷額頗雜篆體其碑髣髴二十行所餘其上一段它石斷裂不存矣第一行有益州刺史中山相薛八字第二行有巴郡太守宗正卿成八字第三行有惟二君三字餘皆不可句讀葢前兩行各舉其官後行始是碑語與廣漢屬國辛李二君碑正同其間有祭死者及薛劉征討字殆是紀述平宼之事趙氏誤以為墓刻故云古無兩人共立一碑者又以劉君為成平侯相詳其額初無相字此葢王子侯也西京列侯其傳國皆有世次東京枝葉既不蕃而史筆又簡略其書于策者不過如東海王傳云王弟二十二人皆為列侯耳故劉君之名不可得而考周官太宰卿一人為太宰以卿一人為之也百官志太傅上公一人太常卿一人葢史氏用周官之法紀傳所書居三九之官者皆不繫以公卿字惟孔廟碑稱呉雄為司徒公趙戒為司空公衡方碑題衛尉卿與此碑所題宗正卿乃遣辭揮翰者益非當時官名也太尉劉寛司空宗俱光禄勲劉曜廷尉仲定碑額俱不加公卿字後世以卿名其官則自蕭梁始司空殘碑上闕躬差觴豆婆娑尊俎盛下闕命爾司空予回爾輔下闕功遂不居思沖芒消下闕納我范既童具彪庶下闕予惟哀憤用著斯詩忉下闕右司空殘碑四十五字政和乙未得之西洛天津橋下所存片石纔五行行九字皆銘詩也字徑二寸餘雄健清新葢漢代之神品其詞有云命爾司空故趙氏謂之司空殘碑末云予惟哀憤用著斯詩知其為丘壠之文也碑陰有皮氏段升子榮題名百有餘人訪之未獲處士嚴發殘碑上闕月戊申朔五日丑彭城下闕桓􅞗章言處嚴發下闕生則有曽閔之行送終則下闕允誠於多友不求直呂下闕分離拔身委讓勤四體㠯下闕鐫堅仰髙西遲衡門甚下闕例所述有一行則可尊下闕葢孔子作春秋裒儀甫㠯下闕塞利欲之是故有商下闕㠯顯寳玉今聴表門閭復下闕勉陵􅜃已表言㑹月下闕上闕君丞汝南番君户􅔟掾下闕右處士嚴發殘碑所存十有二行行凡十字其大略載桓景陳章所言處士嚴發有曾閔之行栖遲衡門誠於朋友引春秋襃儀甫之事後有聴表門閭復之文復下字闕葢邑官稱嚴之行遂表其門閭復其租繇而碑之所由立也末有丞汝南番君及户曹掾題名當是其時官寮也其首行月日之下有彭城字乃其鄉國也召誥云戊午社于新邑越七日甲子是從戊至甲為七日畢命云六月庚午朏越三日壬申亦是從朏至壬為三日西漢律厯志引逸書粤五日乙卯亦然惟武成云丁未祀于周廟越三日庚戌則是祀廟之後三日去丁而不數與召畢二篇立文不同此碑云戊申朔五日癸丑者正用武成句法百官志孝子順孫烈女義婦及學士為民法者皆扁表其門許氏說文云扁者題門户之文則旌閭之事東都葢已有之此碑不見歳年月疑其非漢刻雖字畫不工却不類魏晉以後書法棄之又可惜也碑云鐫堅仰高與今文論語不同又以西為栖為溪􅜃為夷􅞗古響字即志字𨽻續卷一
