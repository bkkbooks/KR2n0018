body:
  text: 隷續卷十九宋洪适撰丹陽太守郭旻碑君諱旻字巨公有周之裔闕七字之穆為文王卿士子孫闕二字君天休闕二字眀徳闕六字之温良慈恕義以將之厥闕二字為可測闕加以體明道術闕五字律小杜洪纎觱舉弊罪當闕二字然獨闕少仕州郡宣著嘉名察孝㢘除郎中謁者使監南甄官闕二字翔聲省其傷疾闕􅻏完命已免􅋋月闕五字數遷敬陵園令廷尉左平治書侍御史獄刑無頗憲臺如砥以父憂去官還拜郎中侍御史遭母憂服除復拜郎中治書侍御史彌縫衮闕四字弱遷兾州刺史闕墉明否萬里作孚九郡咸寧河朔凱闕徵拜尚書闕三字命國之喉闕躬親功顯闕朝異焉是時淮夷蠢迪帝疇宫綏闕書裦􅝏俾守丹楊闕荒治亂召㩦懷逺齊逸俗通聖化黎民用康移風易闕為政四年以公事去官復脩𤣥默惟莫反初年過耳順寢疾􅯠穨延熹元年十月戊戌卒其十二月丙申葬㣲言絶矣諸子曷仰三載禮闋迺羣相與刻石勒銘闕昭所闕二字辭曰於休我師恂恂郭君既明且哲耽此憲闕三字孝睦觀國用闕惟左闕三字易輸勤讚理士師獄無放紛三典執闕三字王人柔遐能邇官亮闕三字蛇闕機夙夜惟寅獫蠻憬彼用綏海濱闕二字緝訛闕三字神功遂身没闕三字運光暉有翕永世不泯昔君即世雖立碑頌裁足載字加有瑕股君之弟故太尉公薨歸葬舊陵於是從子故五原太守鴻議郎柔及𦙍孫范闕二字懐祖之闕迺更刋石不改前文蓋用昭明祖勲闕以宣達情闕庶傳不朽乎云爾右郭旻碑此碑中有裂文予在越時纔得其上一段後一紀尤延之持節江東以其下一半相贈合而為一遂成全碑䟦語在前卷碑以觱為必以召為招封丘令王元賓碑君諱闕字元賓御史君之孫荗村君之子也其先出自周室歴秦及漢有國有家宰相牧守踵武相􅊞皆能輸力盡䂓紀功載籍迄君之身天鍾其美體兹明迹不器之量温慈恵和行以忠恕弱冠喪父以孝立稱敦書恱禮闕心術藝土階環堵兼業並授門徒雲集盛於洙泗學優而仕極州郡察孝㢘郎謁位者􅊲工菀陵葉封丘令經國以禮帥下以徳黎庶有恥莫闕用闕蛑賊逺屏姦軌埽迹以母憂去官服祥辟司空府補闕闕銜好是正直旻穹不弔降兹闕氣年世有八延熹四年五月辛酉遭命而終國隕柱石之佐世喪英彦之士逺近闕嗟莫不傷焉咸以為絶美殊勲冝在金石垂示無窮乃作銘曰於穆王君穹天生徳明允篤誠小心祇翼永言孝思閨庭允勑濟濟學徒來宗來式牧守加禮班敘志職闕貢皇國宿衛帝側王用錫命撫臨三國三國克寧乃大明服闕頌君闕永垂罔極右封丘令王元賓碑隷額兩行所存其下令碑二字歐趙皆以為王元賞予所得者却是元賓字畫分明非是測度其名仿佛是紹一碑之中不可識者纔數字王君以察孝廉為郎謁者故銘詩云宿衞帝側嘗宰宛陵葉封丘三城故云王用錫命撫臨三國以延熹四年卒碑陰在前卷碑以菀為宛冀州從事郭君碑君諱闕六字君之少子心仁而孝弟其先出髙辛興自于周闕蕃虞郭左河魏之間遭昔荒彊乃喪厥土亦世孳孳職思其勲子孫纓布家于樂土因國為氏昔在霸世䧺彦棊峙郭隗吐竒顯於戰國歷秦迄漢將相不輟君其苗胄也闕而温恭烝烝不違學事官曺清身夙興居豐能約持滿不傾資於父母忠以事君性天自然斷斷休闕遵之於鄉其譽日章左國必達正身履方束修勤恪在公眀眀進納闕府密勿其先㤙仁發越宗黨闕三字階闕二字式序堂堂故能弱冠榮寵紀綱入踐賊決闕與闕當服職鍜涷事無留荒歴郡諸曺掾史主簿督郵五官掾功曺守假牧伯虚心貪君子亮遂顯辟彈糾臨時所割肅然靡邦不思當登大階為國哲謀晧天不弔降此􅓇甾君年􅕊一以光和二年大荒較紙月戊申晻䀜而終親戚傷懐同僚涕泠以其三年十月葬冠盖四輯縉紳盈庭痛君懐春凋柯霜榮哀哀考妣追惟霣靈卜商號咷喪子失明兄弟咨嗟􅉃忉傷情孤配禍嗣憔顇焭營悼君短折永歸幽冥自古皆死先民有呈殁而不朽盖謂合聲建石立碑顯揚洪貞攄功美表示後生魂而有知萬軷熙寧懿矣君純淑清性蘭石履珪瑩祖有周世揚聲冠二代為徳經𦙍倉烈系洪纓世作磥為台衡串千軷涵山停傷春樹不垂馨明珠玷夜光虧紫芝凋髙岡穨庶斯言訓孔懐右故兾州從事郭君碑隷額碑之字曖昧者甚鮮獨首行刓剝故不得其名字郭君歴郡諸曺掾史主簿督郵五官掾功曺故總謂之從事其云入踐賊決者謂賊曺決曹也以光和二年卒其文以鍛涷為鍛鍊失名為失明碑中三用軷字一云大荒軷紙月一云萬軷熙寧一云串千較其義未詳尉氏令鄭季宣碑君闕二字字季宣闕聘君之孫下闕君闕度和闕淑闕二字五闕之闕八字文闕十一字有趙宣闕二字振闕二字吳札之髙闕十二字挹闕以闕七字東闕二字守欽闕二字以備禮招陽闕可躍闕十字行父貞忠莭闕六字年闕二字觀國之光闕二字帝闕三字奇闕十一字臣夜在公于斯闕七字賊雲㑹威闕四字我闕十四字年四月闕五字社闕二字馮􅓇黨闕三字逺近闕車闕折駕賦闕十一字乾剛之闕辨闕六字其旅供闕天闕三字東鄙闕二字侵掠如豹闕十一字爾乃闕六字舎措九刑而闕四字政闕二字以俾闕十一字以耕養慰存闕叟鰥獨靡困闕績既闕六字虞放鵃沙闕十二字就洿㥿闕二字恭穢闕三字遺則不闕五字穆闕之中神人恊闕八字之闕三字蜮之害弦謌並闕仁義交闕二字可謂闕二字五典闕四字者也當闕三字儀鴻闕八字春秋五十有七中平二年四月􅉝亥闕卒闕四字之路無䡅闕九字輿旐來闕弱睽孤其三年四月􅉝酉闕葬故吏闕二字垂欲子車之殉闕五字斬縗方闕咨父事君慕衛鼎之不泯思粤人之闕二字追頌君徳伐石銘碑摛闕闕五字令問闕無闕其辭曰堂堂惠君明闕二字聲闕八字帝闕四字君我城討賊闕二字如雷如霆既克有定我心則寧民闕賴祉闕六字迹闕二字顯弈世闕二字厥成伊産闕繼岱宗之靈喬􅛬隕闕景命不闕十二字石休有下闕右漢故尉氏令鄭君碑篆額穹碑多有裂文字畫湮晦少成章句有其字而亡其名官閥略不一見僅存卒葬年月其中數十言載􅓇賊侵掠事前稱其有呉札之髙末叙故吏欲子車之殉碑陰姓名却班班可考其間奇字如書飢作書夙作一字未詳碑有放鵃之句上下文刓滅不可考鵃與鵰同音鶻鵃是鳩名恐是用趙簡子放鳩事鄭季宣碑陰議郎安衆下闕故孟津都尉闕處元闕闗内侯張闕二字詩故方城長毛武闕二字故孝闕三字耽闕虞故從闕三字堂闕康故從事下闕又故從事一人從事楊光子闕故從事宗闕仲故五官掾下闕故五官掾邯鄲闕三字故守令吕嵩仲闕故闕二字任闕二字故督郵邯鄲敬下闕故督闕邯鄲璣元闕今司空掾處闕四字徳源處士闕謙闕真處士闕三字徳處士闕二字子朝處士邯鄲闕三字處士吕林闕二字處士吕瓚闕二字處士闕楚闕政處士闕二字元處士下闕又闕一人故吏闕三字真故吏邯鄲闕盛伯故吏邯鄲謀孝起故吏闕二字子真上闕二字祭酒闕闕才上闕二字掾邯鄲瑾子悤門闕二字曹史李闕二字正主簿下闕主簿闕彪叔闕上闕三字邵訓闕張上闕三字史闕三字禮主簿下闕上闕二字張下闕上闕五字讓闕二字上闕四字祺闕二字門下史邯鄲睦闕寧門下史闕二字元闕記室史辛闕三字主記書佐下闕主記書佐下闕門下書佐我修闕三字記室書佐侯瑾闕二字錄事書佐李規方政記室闕二字陳英元艾騎吏丁闕瑋珪騎吏田闕元戒騎吏馮艾子茂直事干樊順伯叙直事干陳瑚彦臺直事干張超子與直事干楊邵景闕直事小史闕四字直事小史我闕番子門下小史陳勛子懃右鄭季宣碑陰以八篆横刻其上曰尉氏處士故吏人名上下凡四横其中督郵邯鄲璣名字之下細書四字云今司空掾末有直事干四人亦是以干為幹語在景北海司馬整碑陰最後空十餘行有一行刻字似是造碑者所識陳度碑君諱度字妙髙陳國柘闕十四字武王克商封先代之後以元女大姬配胡闕二字封諸陳至厲公而生公子完奔齊遂闕三字竝于正卿以本國闕氏闕三字土子孫闕二字布在華夏至于闕二字敦仁篤學闕十二字首闕四字衣闕二字在約闕十四字思禮闕散施不闕報姻婭九闕國之闕四字振闕五字者蓋不可闕四字是仁闕四字于闕二字國相闕五字督郵闕官闕四字于宜闕皆以疾辭闕十八字忘闕十七字厥勲闕五字中平二年闕十四字淵林曷不闕十三字墓闕七字之闕于景卬闕十字乃闕斯域立此新門闕表烝嘗三闕十七字乃刋石樹碑闕三字人其辭曰闕三字至徳𤣥純少闕十六字不闕命殖孔闕意則屢中闕三阝字闕女闕五字厯愛斯實以光其仁子孫是系其祉日新中平四年九月廿日己丑闕五字立右陳度碑君名度字妙髙陳國柘人靈帝中平二年卒又二年立碑此刻大半紊碎所存近二百字少成句讀其中竝無官稱僅有國相及督郵字繼有皆以疾辭之句其前有散施及姻婭字稱其仁者再三銘詩有貨殖屢中之句似是家有餘財仁周鄰曲相遣督郵招聘稱疾未嘗諾仕者郡國志陳國有柘縣苦縣沛國有相縣苦在春秋時曰相趙氏認柘作相誤也碑以意為億禹廟殘碑上闕二日下闕木案祭器加闕請雨上官往來下闕慘小吏不肯聽行宙念闕三字曰昔時為夏上闕於介丘賢者左右皆䝉大恩闕二字君始闕三字尉下闕誦堯禹其辭曰上闕蕩無闕二字焉陽木隂興鴻水滔天徴下闕河闕二字石闕二字混淪舟輿不至北滌惟艱鎸下闕民闕國靈而有神四時貢奉資盛三牲闕若上闕賄財闕三字云闕四字察闕二字勤上闕兮承闕官夙夜懼兮不曰安闕三五兮闕四字文上闕輿服兮闕机闕靈闕忍兮黨往還闕三字兮五上闕東方闕二字兮永下闕右禹廟一小碑其上漫滅五之三其前漫滅四之一所存者少成句讀唐寳歴中三人同觀刻名其上趙氏有禹廟二碑其一有皮氏長劉尋姓名其一云字畫淺細有皮氏長安定蘇字恐是此一碑碑以資為粢以黨為儻肎即肯字眞道冢地碑此冢政乎欲負冢土勿取冢地中法取東吉利慎勿取西北土也延熹五年七月中旬真道字直中以錢八千從有親真敖字政直直弟政升升二從弟漢宗市冢地連隨地闕等冡闕二字呂闕連瀆海江廣廿二丈内人北行闕瀆廣皆如前錢付畢政等得可中弟闕子孫道闕四字治政等冡左是冡西中等冢左東北祠舎地中等子孫闕三字子孫但得宿山居㽞不得争舎地爭訟天帝誅疾勉崇孝道先人之約讀如闕三字順此書位闕所堅次比闕人闕一字相愛必闕三字不得違犯闕諸存子孫闕益中闕錢酒飯子孫吉不益有所取出即不利後冢東行廣五丈北行不得作冢可示後世冢前也後世作冢從此冢後墳北行門出西闕地也右眞道冢地碑延熹七年眞道以錢八千從眞敖兄弟市此地廣二十二丈其文戒約後世作冢取土方隅但得宿山居留不得爭訟舎地怖之以天帝誅疾勸之以勉從孝道戒之以不得違犯先人之約字札紊碎不能盡通司空掾陳寔殘碑集本有雒中字平五年春三月癸未豫州刾史典以為襃功述徳集有政字之大經是以作諡封墓興於周禮衛鼎晉律集作鍾又云一作銘銘下有其字銘集作有實故太丘長潁川集有許昌字陳寔集有字字仲躬集作弓者集無此字含聖哲之清龢盡集有人才之字碑闕上光明配於日月其下竝闕右漢故司空掾陳君碑篆額蔡中郎所作第三碑也其文乃豫牧襃讚悲傷之辭銘詩有云欽慕在舊有憲有章遇牧斯州庶奉清麈棄余而逝靡瞻靡聞此碑僅有前七十字下文盡皆不存中郎作太丘第一碑云春秋八十三中平三年卒漢史誤作四年此碑作五年者乃豫牧立碑之年也史傳雜書蔡集皆作仲弓惟太丘壇碑作仲躬此碑仿佛亦然趙氏跋云文已殘缺不可辨惟八篆額字畫奇偉引世説注太丘次子諶嘗以司空掾召謂此是陳諶之碑殊不知碑中自有太丘姓名其文又在蔡邕集蓋不能認碑故有斯誤即美字太尉郭禧斷碑公諱禧字公房其先出自有周文下闕者或㠯文闕二字下闕俗㠯適宜修照晰㠯下闕􅕂扶溝蓽門薜闕若下闕察孝㢘闕疾闕二字辭中闕有下闕二𦙍下闕無闕也乃下闕岳光下闕體謙約下闕斯始闕三字之宗人前識仲下闕忠孝體古人之上操不偶下闕億闕韜燿始闕授下闕右太尉郭禧斷碑篆額所存其上一段字畫方勁前後數行僅有數十字可認其中强半剝落篆額亦然首行却有郭君名字叙其得姓則有周文二字禧以靈帝建寧二年為太尉光和二年薨趙云郭氏世為陽翟人自郭躬以下皆𦵏陽翟疑禧嘗寓扶溝返葬故郡史注遂以為扶溝人恐誤予案此碑既云扶溝蓽門應劭漢官儀又云孝靈大尉扶溝郭禧郭旻碑云禧之子五原守鴻奉柩歸葬舊鄉則史注初不誤也張休崕涘銘太山雖髙無得而擬劔道雖險孰可為比吁嗟此山髙且險只上眂波蒼相去能幾宜乎昆侖日月所蔽行人過兹鮮不垂涕深念于斯刋銘崕涘漢延熹二年三月初闕四字張休右磨崕險路銘四言十四句威宗延熹二年刻末有張休姓名姑以名其碑其文謂此山髙擬太山險比劔道上眂彼蒼相去能幾行人過兹鮮不垂涕十數年前藏碑者得之蜀人今尤延之李仲南家有之即比字凢即人字􅑰即垂字隷續卷十九
